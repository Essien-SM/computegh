  s4l3:{
    strand:'Strand 4: Computational Thinking', sub:'Sub-strand 2: Algorithm',
    title:'Pseudocode, Flowcharts & Translation', xp:30, next:'s4l4', prev:'s4l2',
    content:`
      <p>JHS 3 algorithms master <strong>pseudocode</strong> — a way to write algorithms in plain English that bridges the gap between human thinking and actual programming code.</p>
      <div class="highlight-box"><strong>What is Pseudocode?</strong>Pseudocode is a plain-language description of an algorithm's steps — using programming-like structure but human-readable language. It is NOT an actual programming language — it cannot be run by a computer.</div>
      <h3>Pseudocode Conventions</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Input</strong>INPUT name, INPUT score, READ temperature</div>
        <div class="example-item"><strong>Output</strong>OUTPUT "Hello", PRINT result, DISPLAY total</div>
        <div class="example-item"><strong>Assignment</strong>SET score ← 0 (or score = 0)</div>
        <div class="example-item"><strong>Selection (IF)</strong>IF condition THEN ... ELSE ... ENDIF</div>
        <div class="example-item"><strong>Iteration (Loop)</strong>FOR i FROM 1 TO 10 DO ... ENDFOR · WHILE condition DO ... ENDWHILE</div>
        <div class="example-item"><strong>Comments</strong>// This is a comment (explains the algorithm — not executed)</div>
      </div>
      <h3>Example: Handwashing Algorithm in Pseudocode</h3>
      <div class="code-block"><span class="cm">// Proper Handwashing Algorithm</span>
<span class="kw">BEGIN</span>
  OUTPUT <span class="str">"Turn on tap"</span>
  OUTPUT <span class="str">"Wet hands with water"</span>
  OUTPUT <span class="str">"Apply soap"</span>
  SET time <span class="kw">←</span> 0
  <span class="kw">WHILE</span> time < 20 <span class="kw">DO</span>
    OUTPUT <span class="str">"Scrub hands (palms, backs, between fingers, nails)"</span>
    SET time <span class="kw">←</span> time + 1
  <span class="kw">ENDWHILE</span>
  OUTPUT <span class="str">"Rinse hands thoroughly"</span>
  OUTPUT <span class="str">"Dry hands with clean towel"</span>
<span class="kw">END</span></div>
      <h3>Example: Beverage (Tea) Algorithm with Selection</h3>
      <div class="code-block"><span class="kw">BEGIN</span>
  OUTPUT <span class="str">"Boil water"</span>
  OUTPUT <span class="str">"Place teabag in cup"</span>
  OUTPUT <span class="str">"Pour hot water"</span>
  OUTPUT <span class="str">"Wait 3 minutes"</span>
  OUTPUT <span class="str">"Remove teabag"</span>
  INPUT wantSugar
  <span class="kw">IF</span> wantSugar = <span class="str">"yes"</span> <span class="kw">THEN</span>
    OUTPUT <span class="str">"Add sugar"</span>
  <span class="kw">ELSE</span>
    OUTPUT <span class="str">"No sugar added"</span>
  <span class="kw">ENDIF</span>
  Input wantMilk
  <span class="kw">IF</span> wantMilk = <span class="str">"yes"</span> <span class="kw">THEN</span>
    OUTPUT <span class="str">"Add milk"</span>
  <span class="kw">ENDIF</span>
  OUTPUT <span class="str">"Enjoy your tea!"</span>
<span class="kw">END</span></div>
      <h3>Translating Between Flowchart and Pseudocode</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Flowchart → Pseudocode</strong>Oval (Start/End) = BEGIN/END · Rectangle (Process) = SET or calculation · Parallelogram (Input/Output) = INPUT or OUTPUT · Diamond (Decision) = IF...THEN...ELSE...ENDIF · Loop arrows = WHILE or FOR</div>
        <div class="example-item"><strong>Why Translate?</strong>Both represent the SAME algorithm — just different notation. Flowcharts are visual (easier to understand overall logic); Pseudocode is textual (easier to convert to actual code). Being able to translate both ways strengthens algorithmic thinking</div>
      </div>
    `,
    quiz:[
      {q:'Pseudocode is:',opts:['An actual programming language you can run','A type of flowchart software','A plain-language description of an algorithm — NOT an actual programming language','Binary code'],ans:2},
      {q:'In pseudocode, which keyword is used to get data from the user?',opts:['OUTPUT','PRINT','INPUT','SET'],ans:2},
      {q:'Which pseudocode structure represents the Diamond (Decision) shape in a flowchart?',opts:['FOR...ENDFOR','WHILE...ENDWHILE','SET...←','IF...THEN...ELSE...ENDIF'],ans:3},
      {q:'In the tea algorithm, the "IF wantSugar = yes THEN add sugar" is an example of:',opts:['Sequence','Iteration (loop)','Selection (decision/condition)','Input only'],ans:2},
      {q:'Why is it useful to convert between flowcharts and pseudocode?',opts:['They represent the same algorithm differently — practice strengthens algorithmic thinking and eases conversion to actual code','Flowcharts can be run directly by a computer','Pseudocode is only used in Scratch','They represent completely different algorithms'],ans:0}
    ]
  },

  s4l4:{
    strand:'Strand 4: Computational Thinking', sub:'Sub-strand 3: Robotics',
    title:'Asimov\'s Laws of Robotics & Robot Building', xp:25, next:'s4l5', prev:'s4l3',
    content:`
      <p>JHS 3 Robotics advances from theory to practice — building and programming robot artefacts, guided by Isaac Asimov's foundational ethical principles.</p>
      <h3>Isaac Asimov's Three Laws of Robotics</h3>
      <p>Science fiction writer Isaac Asimov (1920-1992) proposed these laws in 1942 as fictional safety rules for robots. They remain influential in AI ethics discussions today:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Law 1: Do No Harm to Humans</strong>"A robot may not injure a human being or, through inaction, allow a human being to come to harm." Safety first — robots must never hurt people, even if ordered to</div>
        <div class="example-item"><strong>Law 2: Obey Orders</strong>"A robot must obey orders given by human beings, except where such orders would conflict with the First Law." Robots are tools — they follow instructions, BUT not if it would harm people</div>
        <div class="example-item"><strong>Law 3: Self-Preservation</strong>"A robot must protect its own existence as long as such protection does not conflict with the First or Second Law." Robots should preserve themselves — but NOT at the cost of human safety or at the expense of following orders</div>
      </div>
      <div class="info-box"><strong>Why Asimov's Laws Matter Today</strong>As real robots and AI systems become more capable, these fictional laws have inspired actual AI safety research. The field of "AI alignment" — ensuring AI systems do what humans intend — is one of the most important areas of computer science today.</div>
      <h3>Robotic Software Platforms for Students</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Scratch</strong>Create animated robot simulations. Program characters to follow commands, sense their environment, and make decisions</div>
        <div class="example-item"><strong>Webots (cyberbotics.com)</strong>Free, professional robot simulator. Program real robot models (wheels, sensors, arms) in Python, C, or Java. No physical robot needed</div>
        <div class="example-item"><strong>Snap!</strong>Advanced block-based programming — can interface with real hardware via Arduino</div>
        <div class="example-item"><strong>Mbot (makeblock.com)</strong>An educational robot kit with a visual programming interface. Build a wheeled robot and program it to follow lines, avoid obstacles, and respond to sensors</div>
        <div class="example-item"><strong>LEGO Mindstorms EV3</strong>Full robot building kit with motors and sensors. Program using the EV3 app, Scratch, or Python</div>
        <div class="example-item"><strong>Lightbot (lightbot.com)</strong>A programming puzzle game teaching sequences, loops, and procedures through guiding a robot</div>
      </div>
      <h3>Assembling a Basic Robot</h3>
      <p>A basic wheeled robot (like mBot) consists of:</p>
      <ol>
        <li><strong>Chassis:</strong> The body/frame holding all components</li>
        <li><strong>Controller Board:</strong> The programmable brain (Arduino-based microcontroller)</li>
        <li><strong>Motors & Wheels:</strong> Move the robot forward, backward, and turn</li>
        <li><strong>Sensors:</strong> Ultrasonic (detect obstacles), infrared (follow lines), light sensors</li>
        <li><strong>Power Source:</strong> Batteries or rechargeable battery pack</li>
        <li><strong>Program it:</strong> Connect to computer, write or drag-and-drop code, upload to robot</li>
      </ol>
    `,
    quiz:[
      {q:'According to Asimov\'s First Law, a robot must NEVER:',opts:['Follow human orders','Protect itself','Injure a human being or allow one to be harmed through inaction','Disobey the Second Law'],ans:2},
      {q:'Asimov\'s Second Law says robots must obey human orders EXCEPT when:',opts:['The order is complex','The order would conflict with the First Law — harming a human','The robot is low on battery','The order comes from a child'],ans:1},
      {q:'Which robot software is browser-based, free, and good for simulating robots without physical hardware?',opts:['Lightbot','Webots','Scratch only','LEGO Mindstorms only'],ans:1},
      {q:'In a basic wheeled robot like mBot, what is the role of the ultrasonic sensor?',opts:['Power the motors','Store the program','Detect obstacles in front of the robot','Light up the robot'],ans:2},
      {q:'Asimov\'s Laws were originally written as:',opts:['Official engineering standards','Laws passed by the United Nations','Fictional safety rules in science fiction — but now influence real AI ethics research','Programming code for actual robots'],ans:2}
    ]
  },

  s4l5:{
    strand:'Strand 4: Computational Thinking', sub:'Sub-strand 4: Artificial Intelligence',
    title:'Expert Systems & Machine Learning', xp:30, next:null, prev:'s4l4',
    content:`
      <p>JHS 3 AI focuses on <strong>Expert Systems</strong> — the classical form of AI — and hands-on Machine Learning using Google's Teachable Machine.</p>
      <h3>Expert Systems — Classical AI</h3>
      <p>An expert system is a computer program that mimics the decision-making ability of a human expert in a specific domain.</p>
      <div class="highlight-box"><strong>Components of an Expert System</strong>
        1. Knowledge Base: A database of facts and IF-THEN rules from human experts<br>
        2. Inference Engine: The reasoning system that applies rules to facts to reach conclusions<br>
        3. User Interface: How the user inputs questions and receives answers
      </div>
      <h3>IF-THEN Rules in Expert Systems</h3>
      <p>Expert systems use IF-THEN logic to make decisions — just like selection/decision in programming:</p>
      <div class="code-block"><span class="cm">// Medical Diagnosis Expert System Example:</span>
<span class="kw">IF</span> temperature > 38.5 <span class="kw">AND</span> headache = <span class="str">"yes"</span> <span class="kw">AND</span> bodyache = <span class="str">"yes"</span>
  <span class="kw">THEN</span> SUGGEST <span class="str">"Possible Malaria — see a doctor"</span>

<span class="kw">IF</span> cough = <span class="str">"yes"</span> <span class="kw">AND</span> shortness_of_breath = <span class="str">"yes"</span>
  <span class="kw">THEN</span> SUGGEST <span class="str">"Possible respiratory infection — see a doctor"</span></div>
      <h3>Real-World Expert Systems</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Telemedicine Systems</strong>Patients input symptoms → AI system suggests possible conditions and recommends action (home treatment vs doctor visit). Used in areas with limited doctor access. Example: mPharma in Ghana provides digital health consultations</div>
        <div class="example-item"><strong>Agricultural Advisory</strong>Farmer inputs crop type, weather, symptoms → system diagnoses plant disease and recommends treatment. Example: Esoko (Ghana) provides crop disease diagnosis</div>
        <div class="example-item"><strong>Legal Expert Systems</strong>Input case details → system provides relevant laws and possible outcomes. Used by lawyers and courts</div>
        <div class="example-item"><strong>Financial Fraud Detection</strong>Bank transactions input → system flags unusual patterns as possible fraud. Your bank uses this when it alerts you about a suspicious transaction</div>
      </div>
      <h3>Google's Teachable Machine</h3>
      <p><strong>Teachable Machine</strong> (teachablemachine.withgoogle.com) is a free, browser-based tool that lets anyone train a machine learning model without coding.</p>
      <ol>
        <li><strong>Create Classes:</strong> Define categories (e.g. "Cat", "Dog", "Background")</li>
        <li><strong>Collect Training Data:</strong> Upload images or use webcam to capture examples of each class</li>
        <li><strong>Train the Model:</strong> Click "Train Model" — the AI learns from your examples</li>
        <li><strong>Test the Model:</strong> Show new images/objects — the model predicts the class</li>
        <li><strong>Export the Model:</strong> Use in websites, apps, or Scratch projects</li>
      </ol>
      <div class="example-grid">
        <div class="example-item"><strong>Whatisit App</strong>An open-source cloud app that identifies objects in photos using machine learning — similar to Google Lens. You take a photo and the AI tells you what it sees</div>
        <div class="example-item"><strong>What this teaches us</strong>Data collection and quality matter — more diverse training images → more accurate model. This is why AI companies collect massive amounts of data. Bias in training data = bias in the model</div>
      </div>
      <div class="info-box"><strong>🎓 Congratulations!</strong>You have completed the full JHS 3 Computing syllabus. You now understand topics from Binary numbers and Expert Systems to Cybersecurity and Cloud Storage — the foundations of modern Computer Science. This knowledge prepares you for Senior High School ICT and beyond. Keep coding, stay curious, and use technology responsibly!</div>
    `,
    quiz:[
      {q:'An Expert System\'s "Knowledge Base" contains:',opts:['The user interface design','Facts and IF-THEN rules from human experts in a specific domain','The machine learning training data','The programming code only'],ans:1},
      {q:'The "Inference Engine" in an expert system:',opts:['Stores all the knowledge','Displays results to the user','Applies the rules from the knowledge base to facts to reach conclusions','Trains machine learning models'],ans:2},
      {q:'Google\'s Teachable Machine allows you to:',opts:['Train a machine learning model using images or sound without writing any code','Write Python programs','Create websites','Hack into systems legally for education'],ans:0},
      {q:'In machine learning, "training data" refers to:',opts:['The speed of the computer','The examples you provide so the AI can learn to recognise patterns','The programming language used','The output of the expert system'],ans:1},
      {q:'What does it mean when there is "bias" in an AI training dataset?',opts:['The AI learns faster','The AI is more accurate','The AI makes unfair or inaccurate predictions because the training examples were not diverse or representative','The AI requires more storage'],ans:2}
    ]
  }
};

const SIDEBAR_B9 = "\n  <div class=\"strand-group\">\n    <div class=\"strand-label\">Strand 1</div>\n    <button class=\"strand-toggle\" onclick=\"toggleStrand(1)\">\n      <span class=\"strand-icon\">&#128187;</span><span>Introduction to Computing</span>\n      <span class=\"chevron\" id=\"chev1\">&#9660;</span>\n    </button>\n    <div class=\"lesson-list\" id=\"strand1List\">\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l1')\">Next-Gen Computers &amp; Trends</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l2')\">Perceptual Computing</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l3')\">Wearables, E-Paper &amp; E-Books</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l4')\">Cloud &amp; Network Storage</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l5')\">Desktop Personalisation</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l6')\">Device Drivers &amp; Hardware</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l7')\">Technology Solutions in Community</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s1l8')\">Ergonomics &amp; Heat Management</div>\n    </div>\n  </div>\n  <div class=\"strand-group\">\n    <div class=\"strand-label\">Strand 2</div>\n    <button class=\"strand-toggle\" onclick=\"toggleStrand(2)\">\n      <span class=\"strand-icon\">&#128221;</span><span>Productivity Software</span>\n      <span class=\"chevron\" id=\"chev2\">&#9660;</span>\n    </button>\n    <div class=\"lesson-list\" id=\"strand2List\">\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l1')\">Word Multimedia &amp; SmartArt</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l2')\">Charts &amp; Multimedia in Word</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l3')\">PowerPoint Animations &amp; Transitions</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l4')\">PowerPoint Multimedia &amp; Charts</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l5')\">DTP: Creating &amp; Critiquing Documents</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l6')\">Spreadsheet: Data &amp; Validation</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s2l7')\">Pivot Tables &amp; Charts</div>\n    </div>\n  </div>\n  <div class=\"strand-group\">\n    <div class=\"strand-label\">Strand 3</div>\n    <button class=\"strand-toggle\" onclick=\"toggleStrand(3)\">\n      <span class=\"strand-icon\">&#127760;</span><span>Communication Networks</span>\n      <span class=\"chevron\" id=\"chev3\">&#9660;</span>\n    </button>\n    <div class=\"lesson-list\" id=\"strand3List\">\n      <div class=\"lesson-item\" onclick=\"loadLesson('s3l1')\">E-Commerce &amp; Cashless Society</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s3l2')\">eLearning</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s3l3')\">Social Media: Benefits &amp; Risks</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s3l4')\">Cyberbullying &amp; Digital Footprint</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s3l5')\">10 Hacking Techniques</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s3l6')\">Blogging</div>\n    </div>\n  </div>\n  <div class=\"strand-group\">\n    <div class=\"strand-label\">Strand 4</div>\n    <button class=\"strand-toggle\" onclick=\"toggleStrand(4)\">\n      <span class=\"strand-icon\">&#129302;</span><span>Computational Thinking</span>\n      <span class=\"chevron\" id=\"chev4\">&#9660;</span>\n    </button>\n    <div class=\"lesson-list\" id=\"strand4List\">\n      <div class=\"lesson-item\" onclick=\"loadLesson('s4l1')\">Binary &amp; Number Systems</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s4l2')\">IDEs &amp; Programming Environments</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s4l3')\">Pseudocode &amp; Flowcharts</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s4l4')\">Asimov's Laws &amp; Robot Building</div>\n      <div class=\"lesson-item\" onclick=\"loadLesson('s4l5')\">Expert Systems &amp; Machine Learning</div>\n    </div>\n  </div>";

// ═══════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════
let LESSONS = {}, LESSON_ORDER = [], STRANDS = [], activeClass = null;

const CLASS_META = {
  b7: { label:'JHS 1 Computing — Ghana NaCCA Curriculum 2021', title:'JHS 1', key:'computegh_b7', color:'var(--gh-green)' },
  b8: { label:'JHS 2 Computing — Ghana NaCCA Curriculum 2021', title:'JHS 2', key:'computegh_b8', color:'var(--gh-gold)' },
  b9: { label:'JHS 3 Computing — Ghana NaCCA Curriculum 2021', title:'JHS 3', key:'computegh_b9', color:'var(--gh-red)' }
};

let state = { xp:0, streak:0, completed:{}, currentLesson:null, quizAnswers:{}, quizSubmitted:false };

function loadClassState(cls) {
  try {
    const s = localStorage.getItem(CLASS_META[cls].key);
    if(s) state = { xp:0, streak:0, completed:{}, currentLesson:null, quizAnswers:{}, quizSubmitted:false, ...JSON.parse(s) };
  } catch(e) {}
}

function saveState() {
  if(!activeClass) return;
  try { localStorage.setItem(CLASS_META[activeClass].key, JSON.stringify(state)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════
//  CLASS SELECTION
// ═══════════════════════════════════════════════════════
function selectClass(cls) {
  activeClass = cls;
  if(cls === 'b7')      { LESSONS=LESSONS_B7; LESSON_ORDER=ORDER_B7; STRANDS=STRANDS_B7; document.getElementById('sidebar').innerHTML=SIDEBAR_B7; }
  else if(cls === 'b8') { LESSONS=LESSONS_B8; LESSON_ORDER=ORDER_B8; STRANDS=STRANDS_B8; document.getElementById('sidebar').innerHTML=SIDEBAR_B8; }
  else                  { LESSONS=LESSONS_B9; LESSON_ORDER=ORDER_B9; STRANDS=STRANDS_B9; document.getElementById('sidebar').innerHTML=SIDEBAR_B9; }

  state = { xp:0, streak:0, completed:{}, currentLesson:null, quizAnswers:{}, quizSubmitted:false };
  loadClassState(cls);

  document.body.classList.remove('class-b7','class-b8','class-b9');
  document.body.classList.add('class-'+cls);
  document.getElementById('navTagline').textContent = CLASS_META[cls].label;
  document.getElementById('classPicker').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('xpDisplay').textContent = state.xp + ' XP';
  document.getElementById('streakDisplay').textContent = '\u{1F525} '+(state.streak||0)+' streak';

  LESSON_ORDER.forEach(id => { if(state.completed[id]) updateSidebarDone(id); });
  renderHome();
}

function showClassPicker() {
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('classPicker').style.display = 'flex';
  activeClass = null;
}

// ═══════════════════════════════════════════════════════
//  XP
// ═══════════════════════════════════════════════════════
function addXP(n) {
  state.xp += n;
  document.getElementById('xpDisplay').textContent = state.xp + ' XP';
  document.getElementById('xpDisplay').classList.add('bounce');
  setTimeout(() => document.getElementById('xpDisplay').classList.remove('bounce'), 400);
  saveState();
}

// ═══════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function toggleStrand(n) {
  const list = document.getElementById('strand'+n+'List');
  const chev = document.getElementById('chev'+n);
  list.classList.toggle('open');
  chev.classList.toggle('open');
}
function setActiveSidebarItem(lessonId) {
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.strand-toggle').forEach(el => el.classList.remove('active-strand'));
  document.querySelectorAll('.lesson-item').forEach(el => {
    const fn = el.getAttribute('onclick');
    if(fn && fn.includes("'"+lessonId+"'")) {
      el.classList.add('active');
      const parentList = el.closest('.lesson-list');
      if(parentList) {
        parentList.classList.add('open');
        const idx = parentList.id.replace('strand','').replace('List','');
        const chev = document.getElementById('chev'+idx);
        if(chev) chev.classList.add('open');
        const toggle = parentList.previousElementSibling;
        if(toggle && toggle.classList.contains('strand-toggle')) toggle.classList.add('active-strand');
      }
    }
    const m = fn ? fn.match(/'(\w+)'/) : null;
    if(m && state.completed[m[1]]) el.classList.add('done');
  });
}
function updateSidebarDone(id) {
  document.querySelectorAll('.lesson-item').forEach(el => {
    const fn = el.getAttribute('onclick');
    if(fn && fn.includes("'"+id+"'")) el.classList.add('done');
  });
}

// ═══════════════════════════════════════════════════════
//  RENDER HOME
// ═══════════════════════════════════════════════════════
function renderHome() {
  state.currentLesson = null;
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.strand-toggle').forEach(el => el.classList.remove('active-strand'));

  const totalLessons = LESSON_ORDER.length;
  const doneLessons = Object.keys(state.completed).length;
  const meta = CLASS_META[activeClass];

  const strandCards = STRANDS.map(s => {
    const done = s.lessons.filter(l => state.completed[l]).length;
    const pct = Math.round((done / s.lessons.length) * 100);
    return `<div class="strand-card" onclick="openStrand(${s.num})">
      <div class="strand-num">STRAND ${s.num}</div>
      <div class="card-icon">${s.icon}</div>
      <h4>${s.label}</h4>
      <p>${s.lessons.length} lessons &middot; ${done}/${s.lessons.length} completed</p>
      <div class="progress-mini"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${pct}% complete</div>
    </div>`;
  }).join('');

  const overallPct = Math.round((doneLessons / totalLessons) * 100);
  document.getElementById('mainContent').innerHTML = `
    <div class="fade-in">
      <div class="welcome-banner">
        <h2>Welcome to ${meta.title} Computing! &#127891;</h2>
        <p>${meta.label}</p>
        <p style="margin-top:1rem;font-size:0.85rem;">
          <strong style="color:#fff;">${doneLessons}/${totalLessons}</strong> lessons completed &nbsp;&middot;&nbsp;
          <strong style="color:${state.xp > 0 ? meta.color : '#9ca3af'};">${state.xp} XP earned</strong>
        </p>
        <div style="height:8px;background:rgba(255,255,255,0.15);border-radius:4px;margin-top:1rem;">
          <div style="height:100%;border-radius:4px;background:${meta.color};width:${overallPct}%;transition:width 0.8s ease;"></div>
        </div>
        <div style="font-size:0.75rem;color:#9ca3af;margin-top:0.4rem;">${overallPct}% of the full ${meta.title} syllabus</div>
      </div>
      <h3 style="font-size:1rem;margin-bottom:1rem;color:var(--gh-muted);font-family:'DM Sans',sans-serif;font-weight:500;">Choose a Strand to Study</h3>
      <div class="strand-cards">${strandCards}</div>
    </div>`;
}

function openStrand(n) {
  const list = document.getElementById('strand'+n+'List');
  const chev = document.getElementById('chev'+n);
  list.classList.add('open');
  chev.classList.add('open');
  if(window.innerWidth <= 768) toggleSidebar();
  const first = list.querySelector('.lesson-item');
  if(first) first.click();
}

function loadLesson(id) {
  const lesson = LESSONS[id];
  if(!lesson) return;
  state.currentLesson = id;
  state.quizAnswers = {};
  state.quizSubmitted = false;
  setActiveSidebarItem(id);
  if(window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
  renderLesson(lesson, id);
  window.scrollTo(0, 0);
}

function renderLesson(lesson, id) {
  const idx = LESSON_ORDER.indexOf(id);
  const prevId = idx > 0 ? LESSON_ORDER[idx-1] : null;
  const nextId = idx < LESSON_ORDER.length-1 ? LESSON_ORDER[idx+1] : null;
  const prevL = prevId ? LESSONS[prevId] : null;
  const nextL = nextId ? LESSONS[nextId] : null;
  const isDone = state.completed[id];
  const meta = CLASS_META[activeClass];

  const quizHTML = lesson.quiz.map((q,qi) => `
    <div class="question-block">
      <div class="question-num">Question ${qi+1} of ${lesson.quiz.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options-list">
        ${q.opts.map((opt,oi) => `<button class="option-btn" id="opt${qi}_${oi}" onclick="selectAnswer(${qi},${oi})">${opt}</button>`).join('')}
      </div>
      <div class="feedback-msg" id="fb${qi}"></div>
    </div>`).join('');

  const endMsg = `<div style="flex:1;text-align:center;padding:1rem;color:var(--gh-muted);font-size:0.85rem;">&#127942; You've completed the entire ${meta.title} Computing syllabus!</div>`;

  document.getElementById('mainContent').innerHTML = `
    <div class="fade-in">
      <div class="lesson-header">
        <div class="breadcrumb-trail">
          <span onclick="renderHome()">&#127968; Home</span> &rsaquo; <span>${lesson.strand}</span> &rsaquo; <span>${lesson.sub}</span>
        </div>
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-meta">
          <span class="meta-tag">${lesson.strand.split(':')[0].trim()}</span>
          <span class="meta-tag blue">+${lesson.xp} XP</span>
          ${isDone ? '<span class="meta-tag green">&#10003; Completed</span>' : ''}
        </div>
      </div>
      <div class="lesson-body">${lesson.content}</div>
      <div class="quiz-section">
        <div class="quiz-header">
          <h3>&#129504; Knowledge Check</h3>
          <span class="quiz-progress-text" id="quizProgressText">0/${lesson.quiz.length} answered</span>
        </div>
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill" style="width:0%"></div></div>
        ${quizHTML}
        <div class="quiz-nav">
          <button class="btn-primary-gh" id="submitBtn" onclick="submitQuiz('${id}')" disabled>Submit Answers</button>
          <button class="btn-outline-gh" onclick="renderLesson(LESSONS['${id}'],'${id}')">&#8635; Reset Quiz</button>
        </div>
        <div class="quiz-result" id="quizResult"></div>
      </div>
      <div class="lesson-nav">
        ${prevL ? `<button class="nav-btn-lesson" onclick="loadLesson('${prevId}')"><div class="nav-label">&larr; Previous</div><div class="nav-title">${prevL.title}</div></button>` : '<div></div>'}
        ${nextL ? `<button class="nav-btn-lesson next" onclick="loadLesson('${nextId}')"><div class="nav-label">Next &rarr;</div><div class="nav-title">${nextL.title}</div></button>` : endMsg}
      </div>
    </div>`;
}

function selectAnswer(qi, oi) {
  if(state.quizSubmitted) return;
  const prev = state.quizAnswers[qi];
  if(prev !== undefined) document.getElementById('opt'+qi+'_'+prev).classList.remove('selected');
  state.quizAnswers[qi] = oi;
  document.getElementById('opt'+qi+'_'+oi).classList.add('selected');
  const lesson = LESSONS[state.currentLesson];
  const answered = Object.keys(state.quizAnswers).length;
  document.getElementById('quizProgressText').textContent = answered+'/'+lesson.quiz.length+' answered';
  document.getElementById('quizProgressFill').style.width = Math.round(answered/lesson.quiz.length*100)+'%';
  if(answered === lesson.quiz.length) document.getElementById('submitBtn').disabled = false;
}

function submitQuiz(id) {
  const lesson = LESSONS[id];
  state.quizSubmitted = true;
  document.getElementById('submitBtn').disabled = true;
  let correct = 0;
  lesson.quiz.forEach((q,qi) => {
    const sel = state.quizAnswers[qi];
    lesson.quiz[qi].opts.forEach((_,oi) => { document.getElementById('opt'+qi+'_'+oi).disabled = true; });
    const fb = document.getElementById('fb'+qi);
    if(sel === q.ans) {
      correct++;
      document.getElementById('opt'+qi+'_'+sel).classList.replace('selected','correct');
      fb.textContent = '\u2713 Correct!';
      fb.className = 'feedback-msg correct show';
    } else {
      if(sel !== undefined) document.getElementById('opt'+qi+'_'+sel).classList.replace('selected','wrong');
      document.getElementById('opt'+qi+'_'+q.ans).classList.add('reveal-correct');
      fb.textContent = '\u2717 The correct answer is: ' + q.opts[q.ans];
      fb.className = 'feedback-msg wrong show';
    }
  });
  const pct = Math.round(correct / lesson.quiz.length * 100);
  let emoji, msg;
  if(pct===100)      { emoji='\u{1F3C6}'; msg='Perfect score! Outstanding work!'; }
  else if(pct>=80)   { emoji='\u{1F31F}'; msg='Excellent! Very strong understanding.'; }
  else if(pct>=60)   { emoji='\u{1F44D}'; msg='Good job! Review the questions you missed.'; }
  else               { emoji='\u{1F4DA}'; msg='Keep studying! Re-read the lesson and retry.'; }
  const earned = Math.round(pct/100 * lesson.xp);
  if(!state.completed[id]) {
    state.completed[id] = true;
    state.streak = (state.streak||0) + 1;
    document.getElementById('streakDisplay').textContent = '\u{1F525} ' + state.streak + ' streak';
    addXP(earned);
    updateSidebarDone(id);
  }
  saveState();
  document.getElementById('quizResult').style.display = 'block';
  document.getElementById('quizResult').innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${correct}/${lesson.quiz.length}</div>
    <div class="result-msg">${msg}</div>
    <div class="xp-badge" style="font-size:0.9rem;padding:6px 18px;display:inline-block;margin-bottom:1.5rem;">+${earned} XP earned</div>
    <div><button class="btn-outline-gh" onclick="renderLesson(LESSONS['${id}'],'${id}')">&#8635; Retry Quiz</button></div>`;
  document.getElementById('quizResult').scrollIntoView({behavior:'smooth',block:'center'});
}
</script>
<script>
// ═══════════════════════════════════════════════════════
//  PWA SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('ComputeGH SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('pwaInstallBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'pwaInstallBanner';
  banner.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;border-radius:40px;padding:12px 24px;display:flex;align-items:center;gap:12px;font-family:Syne,sans-serif;font-size:0.85rem;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;cursor:pointer;white-space:nowrap;';
  banner.innerHTML = '\u{1F4F2} Add ComputeGH to Home Screen &nbsp;<button onclick="installApp()" style="background:#fff;color:#1D9E75;border:none;border-radius:20px;padding:6px 16px;font-weight:700;cursor:pointer;font-size:0.8rem;">Install</button><button onclick="document.getElementById('pwaInstallBanner').remove()" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:1.2rem;cursor:pointer;">&times;</button>';
  document.body.appendChild(banner);
}

async function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  const b = document.getElementById('pwaInstallBanner');
  if (b) b.remove();
}

window.addEventListener('appinstalled', () => {
  const b = document.getElementById('pwaInstallBanner');
  if (b) b.remove();
});
</script>
