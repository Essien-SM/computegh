<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComputeGH — JHS Computing</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ComputeGH">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>

  :root {
    --gh-green: #1D9E75;
    --gh-gold: #EF9F27;
    --gh-red: #D85A30;
    --gh-dark: #1a1a1a;
    --gh-card: #ffffff;
    --gh-bg: #f4f6f0;
    --gh-muted: #6b7280;
    --gh-border: #e5e7eb;
    --sidebar-w: 300px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gh-bg); color: var(--gh-dark); min-height: 100vh; }
  h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

  /* ── TOP NAV ── */
  .topnav {
    background: var(--gh-dark);
    color: #fff;
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    border-bottom: 3px solid var(--gh-green);
    gap: 8px;
  }
  .topnav .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; white-space: nowrap; }
  .topnav .brand span { color: var(--gh-green); }
  .topnav .tagline { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .xp-bar { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; flex-shrink: 0; }
  .xp-badge { background: var(--gh-green); color: #fff; border-radius: 20px; padding: 4px 12px; font-weight: 600; font-size: 0.75rem; white-space: nowrap; }
  .streak { color: var(--gh-gold); font-weight: 600; font-size: 0.85rem; white-space: nowrap; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    position: fixed;
    top: 60px; bottom: 0; left: 0;
    background: var(--gh-dark);
    overflow-y: auto;
    z-index: 900;
    padding: 1.5rem 0 2rem;
    transition: transform 0.3s ease;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .strand-group { margin-bottom: 0.5rem; }
  .strand-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6b7280;
    padding: 1rem 1.5rem 0.4rem;
  }
  .strand-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
    color: #e5e7eb;
    font-size: 0.82rem;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-right: none;
    border-bottom: none;
    width: 100%;
    text-align: left;
    gap: 8px;
  }
  .strand-toggle:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .strand-toggle.active-strand { border-left-color: var(--gh-green); background: rgba(29,158,117,0.1); color: #fff; }
  .strand-icon { font-size: 1.1rem; min-width: 22px; }
  .chevron { font-size: 0.7rem; transition: transform 0.2s; margin-left: auto; }
  .chevron.open { transform: rotate(180deg); }

  .lesson-list { display: none; }
  .lesson-list.open { display: block; }
  .lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.45rem 1.5rem 0.45rem 3rem;
    font-size: 0.78rem;
    color: #9ca3af;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .lesson-item:hover { background: rgba(255,255,255,0.05); color: #e5e7eb; }
  .lesson-item.active { color: var(--gh-green); border-left-color: var(--gh-green); background: rgba(29,158,117,0.08); font-weight: 500; }
  .lesson-item.done::before {
    content: '✓';
    position: absolute;
    left: 1.5rem;
    font-size: 0.65rem;
    color: var(--gh-green);
    font-weight: 700;
  }
  .lesson-item.locked { opacity: 0.4; cursor: not-allowed; }

  /* ── MAIN CONTENT ── */
  .main-content {
    margin-left: var(--sidebar-w);
    margin-top: 60px;
    padding: 2.5rem 2rem 4rem;
    max-width: 860px;
  }

  /* ── HOME / DASHBOARD ── */
  .welcome-banner {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    border-radius: 16px;
    padding: 2.5rem;
    color: #fff;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .welcome-banner::after {
    content: '🇬🇭';
    position: absolute;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 5rem;
    opacity: 0.15;
  }
  .welcome-banner h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .welcome-banner p { color: #9ca3af; font-size: 0.9rem; }

  .strand-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
  .strand-card {
    background: var(--gh-card);
    border-radius: 12px;
    padding: 1.5rem;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .strand-card:hover { border-color: var(--gh-green); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .strand-card .card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
  .strand-card h4 { font-size: 0.95rem; margin-bottom: 0.3rem; }
  .strand-card p { font-size: 0.78rem; color: var(--gh-muted); }
  .progress-mini { height: 4px; background: #e5e7eb; border-radius: 2px; margin-top: 1rem; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--gh-green); transition: width 0.5s ease; }
  .progress-label { font-size: 0.7rem; color: var(--gh-muted); margin-top: 0.3rem; }
  .strand-num { position: absolute; top: 1rem; right: 1rem; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; background: #f4f6f0; padding: 3px 8px; border-radius: 20px; color: var(--gh-muted); }

  /* ── LESSON PAGE ── */
  .lesson-header {
    margin-bottom: 2rem;
  }
  .breadcrumb-trail { font-size: 0.75rem; color: var(--gh-muted); margin-bottom: 0.75rem; }
  .breadcrumb-trail span { cursor: pointer; }
  .breadcrumb-trail span:hover { color: var(--gh-green); }
  .lesson-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
  .lesson-meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--gh-muted); align-items: center; }
  .meta-tag { background: #e5e7eb; border-radius: 20px; padding: 3px 10px; }
  .meta-tag.green { background: #e1f5ee; color: #0f6e56; }

  .lesson-body {
    background: var(--gh-card);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    line-height: 1.8;
    font-size: 0.92rem;
  }
  .lesson-body h3 { font-size: 1.1rem; margin: 1.5rem 0 0.7rem; color: var(--gh-dark); }
  .lesson-body p { margin-bottom: 1rem; color: #374151; }
  .lesson-body ul, .lesson-body ol { padding-left: 1.5rem; margin-bottom: 1rem; }
  .lesson-body li { margin-bottom: 0.5rem; color: #374151; }
  .lesson-body .highlight-box {
    background: #e1f5ee;
    border-left: 4px solid var(--gh-green);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    margin: 1.25rem 0;
    font-size: 0.88rem;
    color: #0f6e56;
  }
  .lesson-body .highlight-box strong { display: block; margin-bottom: 0.3rem; font-family: 'Syne', sans-serif; }
  .lesson-body .info-box {
    background: #faeeda;
    border-left: 4px solid var(--gh-gold);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    margin: 1.25rem 0;
    font-size: 0.88rem;
    color: #633806;
  }
  .lesson-body .info-box strong { display: block; margin-bottom: 0.3rem; font-family: 'Syne', sans-serif; }
  .example-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin: 1rem 0; }
  .example-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.82rem; }
  .example-item strong { display: block; font-size: 0.75rem; color: var(--gh-muted); margin-bottom: 0.2rem; }

  /* ── QUIZ ── */
  .quiz-section {
    background: var(--gh-card);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .quiz-header h3 { font-size: 1.1rem; }
  .quiz-progress-text { font-size: 0.78rem; color: var(--gh-muted); }
  .quiz-progress-bar { height: 5px; background: #e5e7eb; border-radius: 3px; margin-bottom: 1.5rem; }
  .quiz-progress-fill { height: 100%; border-radius: 3px; background: var(--gh-gold); transition: width 0.4s ease; }

  .question-block { margin-bottom: 1.5rem; }
  .question-text { font-size: 0.95rem; font-weight: 500; margin-bottom: 1rem; line-height: 1.5; }
  .question-num { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gh-muted); margin-bottom: 0.4rem; }
  .options-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .option-btn {
    text-align: left;
    padding: 0.75rem 1.1rem;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 0.87rem;
    transition: all 0.15s;
    color: var(--gh-dark);
    font-family: 'DM Sans', sans-serif;
  }
  .option-btn:hover { border-color: var(--gh-green); background: #f0fdf8; }
  .option-btn.selected { border-color: var(--gh-green); background: #e1f5ee; font-weight: 500; }
  .option-btn.correct { border-color: #1D9E75; background: #e1f5ee; color: #085041; font-weight: 500; }
  .option-btn.wrong { border-color: #D85A30; background: #FAECE7; color: #4A1B0C; }
  .option-btn.reveal-correct { border-color: #1D9E75; background: #e1f5ee; color: #085041; }
  .option-btn:disabled { cursor: default; }

  .feedback-msg { margin-top: 0.75rem; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.84rem; display: none; }
  .feedback-msg.correct { background: #e1f5ee; color: #085041; }
  .feedback-msg.wrong { background: #FAECE7; color: #4A1B0C; }
  .feedback-msg.show { display: block; }

  .quiz-nav { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .btn-primary-gh {
    background: var(--gh-green);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.4rem;
    font-size: 0.87rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: background 0.15s;
  }
  .btn-primary-gh:hover { background: #0f6e56; }
  .btn-primary-gh:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-outline-gh {
    background: transparent;
    color: var(--gh-green);
    border: 2px solid var(--gh-green);
    border-radius: 8px;
    padding: 0.6rem 1.4rem;
    font-size: 0.87rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all 0.15s;
  }
  .btn-outline-gh:hover { background: var(--gh-green); color: #fff; }

  /* Results */
  .quiz-result {
    text-align: center;
    padding: 2rem;
    display: none;
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
  .result-score { font-size: 2.5rem; font-weight: 800; font-family: 'Syne', sans-serif; color: var(--gh-green); }
  .result-msg { font-size: 0.9rem; color: var(--gh-muted); margin: 0.5rem 0 1.5rem; }
  .xp-earned { background: var(--gh-gold); color: #fff; border-radius: 20px; display: inline-block; padding: 5px 16px; font-size: 0.8rem; font-weight: 700; margin-bottom: 1.5rem; }

  /* Next lesson nav */
  .lesson-nav { display: flex; gap: 1rem; margin-top: 1.5rem; }
  .nav-btn-lesson {
    flex: 1;
    padding: 1rem;
    border-radius: 10px;
    border: 2px solid #e5e7eb;
    background: #fff;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-btn-lesson:hover { border-color: var(--gh-green); }
  .nav-btn-lesson.next { background: var(--gh-green); border-color: var(--gh-green); color: #fff; }
  .nav-btn-lesson .nav-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: inherit; opacity: 0.7; margin-bottom: 0.2rem; font-family: 'Syne', sans-serif; }
  .nav-btn-lesson .nav-title { font-size: 0.82rem; font-weight: 500; }

  /* ── HAMBURGER for mobile ── */
  .hamburger { display: none; background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 850; }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 768px) {
    :root { --sidebar-w: 280px; }

    /* Topnav mobile */
    .topnav { padding: 0 0.9rem; height: 56px; }
    .topnav .brand { font-size: 1.1rem; }
    .topnav .tagline { display: none; }
    .xp-bar { gap: 6px; }
    .streak { font-size: 0.75rem; }
    .xp-badge { padding: 3px 9px; font-size: 0.7rem; }
    .change-class-btn { padding: 3px 10px; font-size: 0.68rem; }

    /* Sidebar */
    .sidebar { transform: translateX(-100%); top: 56px; }
    .sidebar.open { transform: translateX(0); }

    /* Main */
    .main-content { margin-left: 0; margin-top: 56px; padding: 1.25rem 0.85rem 5rem; }

    /* Cards & grids */
    .strand-cards { grid-template-columns: 1fr; }
    .example-grid { grid-template-columns: 1fr; }

    /* Hamburger */
    .hamburger { display: block; }

    /* Quiz */
    .quiz-nav { flex-wrap: wrap; }
    .quiz-nav .btn-primary-gh,
    .quiz-nav .btn-outline-gh { flex: 1; text-align: center; }

    /* Welcome banner */
    .welcome-banner { padding: 1.5rem 1.25rem; }
    .welcome-banner h2 { font-size: 1.3rem; }
    .welcome-banner::after { font-size: 3.5rem; right: 1rem; }

    /* Lesson title */
    .lesson-title { font-size: 1.2rem; }

    /* Lesson body & quiz padding */
    .lesson-body { padding: 1.25rem; }
    .quiz-section { padding: 1.25rem; }

    /* Lesson nav buttons */
    .lesson-nav { flex-direction: column; gap: 0.6rem; }
    .nav-btn-lesson { width: 100%; }

    /* Lesson meta wrap */
    .lesson-meta { flex-wrap: wrap; gap: 0.4rem; }
  }

  @media (max-width: 400px) {
    .topnav .brand { font-size: 1rem; }
    .streak { display: none; }
    .xp-badge { font-size: 0.68rem; }
    .change-class-btn { font-size: 0.65rem; padding: 2px 8px; }
    .main-content { padding: 1rem 0.65rem 5rem; }
  }

  /* ── ANIMATIONS ── */
  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .bounce { animation: bounce 0.4s ease; }
  @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }


/* ── CLASS PICKER ── */
#classPicker {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #1a1a2e 100%);
  padding: 2rem;
}
#appShell { display: none; }
.picker-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.8rem; color: #fff; letter-spacing: -1px; margin-bottom: 0.3rem; }
.picker-logo span { color: var(--gh-green); }
.picker-subtitle { color: #9ca3af; font-size: 0.9rem; margin-bottom: 3rem; text-align: center; }
.picker-prompt { font-family: 'Syne', sans-serif; font-size: 1rem; color: #e5e7eb; margin-bottom: 1.5rem; letter-spacing: 0.5px; }
.class-cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
.class-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  width: 200px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  color: #fff;
  backdrop-filter: blur(10px);
}
.class-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
.class-card[data-class="b7"]:hover { border-color: var(--gh-green); background: rgba(29,158,117,0.15); }
.class-card[data-class="b8"]:hover { border-color: var(--gh-gold); background: rgba(239,159,39,0.15); }
.class-card[data-class="b9"]:hover { border-color: var(--gh-red); background: rgba(216,90,48,0.15); }
.class-card .class-emoji { font-size: 3rem; margin-bottom: 1rem; }
.class-card .class-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
.class-card .class-sub { font-size: 0.78rem; color: #9ca3af; margin-bottom: 1rem; }
.class-card .class-lessons { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 14px; font-size: 0.72rem; color: #d1fae5; font-weight: 600; display: inline-block; }
.picker-flag { margin-top: 3rem; color: #6b7280; font-size: 0.78rem; text-align: center; }

/* ── CLASS PICKER RESPONSIVE ── */
@media (max-width: 768px) {
  #classPicker {
    padding: 2rem 1.25rem 3rem;
    justify-content: flex-start;
    padding-top: 3.5rem;
  }
  .picker-logo { font-size: 2rem; }
  .picker-subtitle { font-size: 0.82rem; margin-bottom: 2rem; }
  .picker-prompt { font-size: 0.9rem; margin-bottom: 1.25rem; }
  .class-cards {
    flex-direction: column;
    align-items: stretch;
    gap: 1rem;
    width: 100%;
    max-width: 360px;
  }
  .class-card {
    width: 100%;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    text-align: left;
    border-radius: 16px;
  }
  .class-card .class-emoji {
    font-size: 2.4rem;
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .class-card .class-name { font-size: 1.1rem; margin-bottom: 0.1rem; }
  .class-card .class-sub  { font-size: 0.74rem; margin-bottom: 0.5rem; }
  .picker-flag { margin-top: 2rem; font-size: 0.72rem; }
}

@media (max-width: 380px) {
  .picker-logo { font-size: 1.75rem; }
  #classPicker { padding-top: 2.5rem; }
  .class-card { padding: 1rem 1.25rem; gap: 1rem; }
  .class-card .class-emoji { font-size: 2rem; }
}
/* ── CLASS ACCENT OVERRIDES ── */
body.class-b8 .topnav { border-bottom-color: var(--gh-gold); }
body.class-b8 .xp-badge { background: var(--gh-gold); }
body.class-b8 .lesson-item.active { color: var(--gh-gold); border-left-color: var(--gh-gold); }
body.class-b8 .lesson-item.done::before { color: var(--gh-gold); }
body.class-b8 .strand-toggle.active-strand { border-left-color: var(--gh-gold); background: rgba(239,159,39,0.1); }
body.class-b8 .progress-fill { background: var(--gh-gold); }
body.class-b8 .btn-primary-gh { background: var(--gh-gold); }
body.class-b8 .btn-primary-gh:hover { background: #BA7517; }
body.class-b8 .btn-outline-gh { color: var(--gh-gold); border-color: var(--gh-gold); }
body.class-b8 .btn-outline-gh:hover { background: var(--gh-gold); color: #fff; }
body.class-b8 .nav-btn-lesson:hover { border-color: var(--gh-gold); }
body.class-b8 .nav-btn-lesson.next { background: var(--gh-gold); border-color: var(--gh-gold); }
body.class-b8 .result-score { color: var(--gh-gold); }
body.class-b9 .topnav { border-bottom-color: var(--gh-red); }
body.class-b9 .xp-badge { background: var(--gh-red); }
body.class-b9 .lesson-item.active { color: var(--gh-red); border-left-color: var(--gh-red); }

const LESSONS = {

  // ──────────── STRAND 1 ────────────
  s1l1: {
    strand: 'Strand 1: Introduction to Computing',
    sub: 'Sub-strand 1: Components of Computers',
    title: 'Fourth-Generation Computers',
    xp: 20,
    next: 's1l2', prev: null,
    content: `
      <p>Computers have evolved over many decades. The <strong>fourth generation of computers</strong> (from the 1970s to today) is defined by the use of <strong>microprocessors</strong> — tiny silicon chips that contain millions of transistors.</p>
      <div class="highlight-box"><strong>Key Fact</strong>The microchip (microprocessor) is what makes your phone, laptop, and tablet possible. All modern computers are fourth-generation computers.</div>
      <h3>Features of Fourth-Generation Computers</h3>
      <ul>
        <li><strong>Microchips (LSI/VLSI):</strong> Large-Scale Integration allows millions of transistors on a single chip</li>
        <li><strong>Small in size:</strong> Desktop computers, laptops, tablets, and smartphones</li>
        <li><strong>Fast processing speed:</strong> Measured in GHz (gigahertz)</li>
        <li><strong>Large storage capacity:</strong> Hard drives, SSDs measured in GB and TB</li>
        <li><strong>Low power consumption:</strong> More energy-efficient than earlier generations</li>
        <li><strong>User-friendly:</strong> Graphical User Interfaces (GUI) — windows, icons, menus</li>
        <li><strong>Networking:</strong> Built for internet and communication</li>
      </ul>
      <h3>Architecture of a Processor (CPU)</h3>
      <p>The Central Processing Unit (CPU) is the brain of the computer. It has three main parts:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Control Unit (CU)</strong>Directs all operations — tells other parts what to do and when</div>
        <div class="example-item"><strong>Arithmetic Logic Unit (ALU)</strong>Performs all calculations (addition, subtraction) and logical decisions</div>
        <div class="example-item"><strong>Registers</strong>Very fast, tiny memory inside the CPU that holds data being processed right now</div>
        <div class="example-item"><strong>Cache Memory</strong>Fast memory that stores frequently used instructions so the CPU doesn't wait</div>
      </div>
      <div class="info-box"><strong>Did You Know?</strong>The first microprocessor was the Intel 4004, released in 1971. Today's processors have over 50 billion transistors!</div>
      <h3>Generations Summary</h3>
      <ul>
        <li><strong>1st Generation (1940s–50s):</strong> Vacuum tubes — huge, hot, expensive</li>
        <li><strong>2nd Generation (1950s–60s):</strong> Transistors — smaller and more reliable</li>
        <li><strong>3rd Generation (1960s–70s):</strong> Integrated Circuits (ICs) — multiple transistors on one chip</li>
        <li><strong>4th Generation (1970s–now):</strong> Microprocessors — millions of transistors on one chip</li>
      </ul>
    `,
    quiz: [
      { q: 'What technology defines fourth-generation computers?', opts: ['Vacuum tubes','Transistors','Microprocessors','Integrated Circuits'], ans: 2 },
      { q: 'Which part of the CPU performs mathematical calculations?', opts: ['Control Unit','Cache Memory','Register','Arithmetic Logic Unit'], ans: 3 },
      { q: 'What does GUI stand for?', opts: ['General User Integration','Graphical User Interface','Global Unit Interface','General Unified Input'], ans: 1 },
      { q: 'Processor speed is measured in:', opts: ['Megabytes','GHz (Gigahertz)','Pixels','Watts'], ans: 1 },
      { q: 'Which of these is NOT a fourth-generation computer?', opts: ['Smartphone','Laptop','ENIAC (1940s computer)','Tablet'], ans: 2 }
    ]
  },

  s1l2: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 1: Components of Computers',
    title: 'Input Devices', xp: 20, next: 's1l3', prev: 's1l1',
    content: `
      <p>An <strong>input device</strong> is any hardware used to send data or instructions into a computer. Without input devices, you cannot interact with your computer!</p>
      <div class="highlight-box"><strong>Definition</strong>An input device receives data from the user or environment and converts it into a form the computer can understand.</div>
      <h3>Types of Input Devices</h3>
      <p>Input devices are grouped into two categories:</p>
      <h3>1. Manual Input Devices</h3>
      <p>These require a human to actively operate them:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Keyboard</strong>Most common input device — used to type text and commands</div>
        <div class="example-item"><strong>Mouse</strong>Points and clicks to select items on screen. Can be wired or wireless</div>
        <div class="example-item"><strong>Touchscreen</strong>You touch the screen directly — used in phones and tablets</div>
        <div class="example-item"><strong>Joystick</strong>Used mainly for games and controlling equipment</div>
        <div class="example-item"><strong>Graphics Tablet</strong>Artists draw on a flat pad using a special pen (stylus)</div>
        <div class="example-item"><strong>Microphone</strong>Converts voice/sound into digital data for the computer</div>
      </div>
      <h3>2. Automatic Input Devices</h3>
      <p>These collect data without much human effort:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Barcode Reader</strong>Reads barcodes on products in shops and supermarkets</div>
        <div class="example-item"><strong>Scanner</strong>Converts printed documents or photos into digital images</div>
        <div class="example-item"><strong>Digital Camera</strong>Captures photos/videos and stores them as digital files</div>
        <div class="example-item"><strong>Sensor</strong>Detects temperature, motion, light and sends data to the computer</div>
      </div>
      <h3>Advantages and Disadvantages</h3>
      <div class="example-grid">
        <div class="example-item"><strong>✅ Advantages</strong>Allow humans to control computers; many choices for different tasks; some are very fast and accurate (barcode readers)</div>
        <div class="example-item"><strong>❌ Disadvantages</strong>Can break easily; some are expensive; keyboards can cause repetitive strain injury with overuse</div>
      </div>
      <div class="info-box"><strong>Real-World Example in Ghana</strong>When you buy items at a store like Shoprite or Game, the cashier uses a barcode reader (automatic input device) to scan your products.</div>
    `,
    quiz: [
      { q: 'Which of these is an AUTOMATIC input device?', opts: ['Keyboard','Mouse','Barcode reader','Joystick'], ans: 2 },
      { q: 'A touchscreen is an example of which type of input device?', opts: ['Automatic','Output','Manual','Storage'], ans: 2 },
      { q: 'Which input device would an artist most likely use to draw on a computer?', opts: ['Barcode reader','Graphics tablet','Scanner','Microphone'], ans: 1 },
      { q: 'What does a scanner do?', opts: ['Prints documents','Converts printed documents to digital images','Reads barcodes','Plays sound'], ans: 1 },
      { q: 'Repetitive Strain Injury (RSI) can be caused by overuse of which device?', opts: ['Barcode reader','Digital camera','Keyboard','Scanner'], ans: 2 }
    ]
  },

  s1l3: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 1: Components of Computers',
    title: 'Output Devices', xp: 20, next: 's1l4', prev: 's1l2',
    content: `
      <p>An <strong>output device</strong> takes processed data from the computer and presents it in a form humans can understand — as text, images, sound, or physical prints.</p>
      <div class="highlight-box"><strong>Definition</strong>Output devices receive data from the computer and convert it into a human-readable or usable form.</div>
      <h3>Common Output Devices</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Monitor (Screen)</strong>The most common output device. Displays text, images, and videos</div>
        <div class="example-item"><strong>Printer</strong>Produces paper copies of documents. Types: inkjet, laser, dot matrix</div>
        <div class="example-item"><strong>Speakers/Headphones</strong>Output audio — music, voice, alerts, videos</div>
        <div class="example-item"><strong>Projector</strong>Displays computer output on a large screen — used in classrooms</div>

      <h3>Special Output Devices from the Syllabus</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Graphing Plotter</strong>Draws precise technical drawings, blueprints, and graphs. Used by engineers and architects</div>

        <div class="example-item"><strong>Pico Projector</strong>A tiny, pocket-sized projector. Can connect to phones and laptops</div>

      <h3>Advantages and Disadvantages</h3>

        <div class="example-item"><strong>✅ Advantages</strong>Allow us to see and hear computer results; projectors allow large groups to see at once; plotters give very accurate outputs</div>
        <div class="example-item"><strong>❌ Disadvantages</strong>Printers use expensive ink; monitors can cause eye strain; plotters and projectors can be costly</div>
      </div>
      <div class="info-box"><strong>Note</strong>A monitor is both an input and output device when it has a touchscreen. It is called an <strong>Input/Output (I/O) device</strong>.</div>
    `,

      { q: 'Which output device would an engineer use to print very precise technical drawings?', opts: ['Inkjet printer','Pico projector','Graphing plotter','Monitor'], ans: 2 },
      { q: 'What is a pico projector?', opts: ['A large classroom projector','A pocket-sized projector','A type of printer','A scanner'], ans: 1 },
      { q: 'Which of these is NOT an output device?', opts: ['Speaker','Printer','Keyboard','Monitor'], ans: 2 },
      { q: 'A monitor can also be an input device when it has a:', opts: ['Keyboard','USB port','Touchscreen','Microphone'], ans: 2 },
      { q: 'Using a monitor for long periods can cause:', opts: ['Hearing loss','Eye strain','Wrist pain','Backache only'], ans: 1 }
    ]
  },

  s1l4: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 1: Components of Computers',
    title: 'Storage Devices', xp: 20, next: 's1l5', prev: 's1l3',
    content: `
      <p><strong>Storage devices</strong> are used to save data permanently or temporarily. Unlike RAM (temporary memory), storage devices keep your files even when the computer is off.</p>
      <h3>Hard Disk Drives (HDD)</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Internal HDD</strong>Built inside the computer. Stores the operating system, software, and your files. Common sizes: 500GB, 1TB, 2TB</div>
        <div class="example-item"><strong>External HDD</strong>Portable device you plug in via USB. Great for backups. Can hold up to 5TB or more</div>
      </div>
      <p><strong>Hard Drive Speed</strong> is measured in RPM (Revolutions Per Minute). Faster RPM = faster data access. Common: 5400 RPM and 7200 RPM drives.</p>
      <p><strong>Disk Caching</strong> is a technique where frequently used data is stored in fast memory (cache) so the hard drive doesn't have to spin to find it every time — making your computer faster.</p>
      <h3>Optical Discs and Drives</h3>
      <div class="highlight-box"><strong>Three Types of Optical Discs</strong></div>
      <div class="example-grid">
        <div class="example-item"><strong>Read-Only (ROM)</strong>CD-ROM, DVD-ROM, BD-ROM — already has data; you cannot add or change anything</div>
        <div class="example-item"><strong>Recordable (R)</strong>CD-R, DVD-R, DVD+R, BD-R — you can write data ONCE, then it becomes read-only</div>
        <div class="example-item"><strong>Rewritable (RW)</strong>CD-RW, DVD-RW, DVD+RW, BD-RE — you can write, erase, and rewrite data many times</div>
        <div class="example-item"><strong>Capacity Comparison</strong>CD ~700MB · DVD ~4.7GB · Blu-ray (BD) ~25GB</div>
      </div>
      <div class="info-box"><strong>Portable Storage</strong>USB Flash drives (thumb drives) are the most popular portable storage today — small, light, and can hold up to 1TB. They are NOT optical discs but solid-state storage.</div>
    `,
    quiz: [
      { q: 'What does "ROM" mean in CD-ROM?', opts: ['Read Only Memory','Record On Media','Rewritable Optical Media','Read Or Make'], ans: 0 },
      { q: 'Which optical disc can you write to ONCE and then never change?', opts: ['DVD-ROM','DVD-RW','DVD-R','BD-RE'], ans: 2 },
      { q: 'Hard drive speed is measured in:', opts: ['GHz','RPM','GB','MB/s only'], ans: 1 },
      { q: 'Which has the largest storage capacity?', opts: ['CD-ROM (700MB)','DVD (4.7GB)','Blu-ray BD (25GB)','They are all the same'], ans: 2 },
      { q: 'Disk caching is used to:', opts: ['Store music files','Make data access faster by using fast memory','Format a hard drive','Connect to the internet'], ans: 1 }
    ]
  },

  s1l5: {

    title: 'The Windows Desktop', xp: 20, next: 's1l6', prev: 's1l4',
    content: `
      <p>The <strong>Windows Desktop</strong> is the main screen you see when Windows starts. It is your workspace — from here you can open programs, manage files, and customise your experience.</p>
      <h3>Key Features of the Windows Desktop</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Start Screen / Start Menu</strong>Click the Windows icon (bottom-left) to open programs, settings, and search for files</div>
        <div class="example-item"><strong>Tiles (Windows 8/10/11)</strong>Large clickable squares that launch apps — like apps on a phone. Live tiles can show updates</div>
        <div class="example-item"><strong>Taskbar</strong>The bar at the bottom of the screen. Shows open programs and pinned shortcuts</div>

  s1l6: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 2: Windows Desktop',
    title: 'File Management', xp: 20, next: 's1l7', prev: 's1l5',
    content: `
      <p><strong>File management</strong> is the practice of organising, naming, storing, and maintaining files on a computer so they are easy to find and use.</p>
      <h3>Files and Folders</h3>
      <p>A <strong>file</strong> is a collection of data stored with a name. A <strong>folder</strong> (also called a directory) is a container that holds files or other folders (subfolders).</p>
      <div class="highlight-box"><strong>Good Naming Conventions</strong>Use clear, descriptive names. Example: "Science_Assignment_Week3.docx" is much better than "doc1.docx"</div>
      <h3>File Extensions</h3>
      <p>A file extension is the part after the dot (.) that tells you what type of file it is:</p>
      <div class="example-grid">
        <div class="example-item"><strong>.docx</strong>Microsoft Word document</div>
        <div class="example-item"><strong>.xlsx</strong>Microsoft Excel spreadsheet</div>
        <div class="example-item"><strong>.pptx</strong>Microsoft PowerPoint presentation</div>
        <div class="example-item"><strong>.jpg / .png</strong>Image files</div>
        <div class="example-item"><strong>.mp4</strong>Video file</div>
        <div class="example-item"><strong>.pdf</strong>Portable Document Format — readable everywhere</div>
      </div>
      <h3>User Accounts and Permission Levels</h3>
      <p>Windows supports different account types to keep the computer safe:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Administrator</strong>Full control — can install software, change settings, create other accounts. Usually the owner/parent</div>
        <div class="example-item"><strong>Standard User</strong>Can use programs but cannot install software or change system settings without admin password</div>
        <div class="example-item"><strong>Guest</strong>Very limited — temporary access with no ability to change settings or save personal files</div>
      </div>
      <h3>File and Folder Permissions</h3>

        <div class="example-item"><strong>Full Control</strong>Can read, write, delete, and change permissions</div>

      <div class="info-box"><strong>Why Does This Matter?</strong>Permission levels protect important files. If your school's timetable is "Read Only" for students, no student can accidentally delete or change it.</div>
    `,

      { q: 'Which of these is the BEST file name?', opts: ['doc1','untitled','Science_Assignment_Week3.docx','file'], ans: 2 }

  s1l8: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 2: Technology in the Community',
    title: 'Computers & the Environment', xp: 20, next: 's1l9', prev: 's1l7',
    content: `
      <p>While computers have changed our lives positively, their production and disposal have serious effects on the environment. As responsible citizens, we must understand and address these issues.</p>
      <h3>Negative Impacts of Computers on the Environment</h3>
      <ul>
        <li><strong>E-waste (Electronic Waste):</strong> Old computers, phones, and electronics that are thrown away — they contain toxic materials like lead, mercury, and cadmium</li>
        <li><strong>Energy consumption:</strong> Data centres and millions of computers consume huge amounts of electricity, contributing to carbon emissions</li>
        <li><strong>Manufacturing pollution:</strong> Making computer chips requires water and chemicals that can pollute rivers and soil</li>
        <li><strong>Resource extraction:</strong> Rare minerals (like cobalt and coltan) are mined, often causing environmental destruction</li>
      </ul>
      <div class="highlight-box"><strong>Agbogbloshie, Accra</strong>One of the world's largest e-waste dumps is at Agbogbloshie in Accra, Ghana. Electronic waste from Europe, the USA, and Asia is shipped here and burned, releasing toxic fumes. Workers, including young people, suffer serious health problems.</div>
      <h3>Environmentally Responsible Practices</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Reduce</strong>Use devices for as long as possible before replacing. Don't buy new gadgets you don't need</div>
        <div class="example-item"><strong>Reuse</strong>Donate old working computers to schools or charities instead of throwing them away</div>
        <div class="example-item"><strong>Recycle</strong>Take old electronics to official e-waste collection centres where materials are safely recovered</div>
        <div class="example-item"><strong>Energy Saving</strong>Turn off computers when not in use. Enable sleep mode. Use energy-efficient devices</div>
      </div>
      <h3>Creating from Disposed Parts</h3>
      <p>Old computer parts can be repurposed creatively. For example: old circuit boards can become artwork, old keyboards can be used for display, and computer fans can be used in science projects.</p>
      <div class="info-box"><strong>Action Point</strong>In your community, propose that old electronics be collected and properly recycled instead of being burned. This protects our health and environment.</div>
    `,
    quiz: [
      { q: 'What is "e-waste"?', opts: ['Emails that waste time','Discarded electronic devices','Energy wasted by computers','Electronic money'], ans: 1 },
      { q: 'Which famous e-waste site is located in Accra, Ghana?', opts: ['Tema Industrial Zone','Kumasi Market','Agbogbloshie','Kotoka'], ans: 2 },
      { q: 'Which of these is an environmentally responsible practice?', opts: ['Burning old electronics','Dumping old computers in rivers','Donating working computers to schools','Buying a new phone every month'], ans: 2 },
      { q: 'Which toxic material found in old computers is dangerous when burned?', opts: ['Plastic only','Lead, mercury, and cadmium','Sand','Glass'], ans: 1 },
      { q: 'How can energy consumption from computers be reduced?', opts: ['Use more computers','Leave computers on all night','Turn off computers when not in use','Buy bigger screens'], ans: 2 }

  s1l9: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 3: Health & Safety',
    title: 'Health & Safety Using ICT', xp: 20, next: 's2l1', prev: 's1l8',
    content: `
      <p>Using computers incorrectly or for too long without breaks can cause real health problems. Learning safe practices now protects your health for life.</p>
      <h3>Computing-Related Health Disorders</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Computer Vision Syndrome</strong>Dry, tired, blurry eyes from staring at a screen too long. Follow the 20-20-20 rule: every 20 minutes, look 20 feet away for 20 seconds</div>
        <div class="example-item"><strong>Repetitive Strain Injury (RSI)</strong>Pain in wrists, fingers, or arms from repetitive typing or mouse use. Take regular breaks and stretch</div>
        <div class="example-item"><strong>Carpal Tunnel Syndrome</strong>Numbness and pain in the hand/wrist caused by pressure on a nerve from repeated keyboard use</div>
        <div class="example-item"><strong>Hearing Impairment</strong>Damage to hearing from listening to music/videos too loudly through headphones. Keep volume below 60%</div>
        <div class="example-item"><strong>Back & Neck Pain</strong>Poor posture while sitting leads to back and neck pain. Sit up straight with your back supported</div>
        <div class="example-item"><strong>Headaches</strong>Screen glare, poor lighting, and eyestrain can all cause headaches</div>
      </div>
      <h3>Safety Measures with ICT Equipment</h3>
      <ul>
        <li><strong>Liquids near computers:</strong> NEVER spill water or drinks on a computer — can cause electric shock and destroy the device</li>
        <li><strong>Power cables:</strong> Keep cables organised and away from walkways to prevent tripping</li>
        <li><strong>Electrical safety:</strong> Never touch exposed wires or the terminals of plugs. Always use proper sockets</li>
        <li><strong>Overloading sockets:</strong> Don't plug too many devices into one socket — can cause fire</li>
      </ul>
      <h3>Workstation Setup for Safety</h3>
      <div class="highlight-box"><strong>Correct Workstation Posture</strong>
        • Eyes level with the top third of the screen<br>
        • Back straight, fully supported by chair<br>
        • Feet flat on floor (or footrest)<br>
        • Wrists straight when typing — not bent up or down<br>
        • Screen 50–70 cm from your eyes<br>
        • Screen free from glare (no bright light behind or in front of it)
      </div>
      <div class="info-box"><strong>Remember</strong>Take a 5-10 minute break every hour of computer use. Stand up, stretch, walk around. Your body and eyes will thank you!</div>
    `,
    quiz: [
      { q: 'What is the 20-20-20 rule for eye health?', opts: ['20 minutes of work, 20-minute break, 20 hours of sleep','Every 20 minutes, look 20 feet away for 20 seconds','Sit 20cm from the screen for 20 minutes','Use the computer for 20 hours only'], ans: 1 },
      { q: 'Carpal Tunnel Syndrome mainly affects which body part?', opts: ['Eyes','Back','Wrist/hand','Ears'], ans: 2 },
      { q: 'Why should you NOT have liquids near a computer?', opts: ['It is bad manners','Liquids can cause electric shock and damage the device','It makes the screen blurry','It slows down internet speed'], ans: 1 },
      { q: 'What causes Repetitive Strain Injury (RSI)?', opts: ['Looking at screens too long','Repeating the same physical motions (typing, clicking) excessively','Playing music too loud','Poor workstation lighting'], ans: 1 },
      { q: 'How should your eyes be positioned relative to your screen?', opts: ['Screen should be above your eye level','Eyes should be level with the top third of the screen','Screen should be below your lap','Eyes should look up at 45 degrees'], ans: 1 }
    ]

      <p><strong>Word processing software</strong> is a computer program used to create, edit, format, save, and print text documents. It is one of the most commonly used types of software in schools and offices.</p>
      <div class="highlight-box"><strong>Definition</strong>A word processor is software that allows you to write, edit, and format text on a computer — like a very powerful, digital typewriter.</div>
      <h3>Common Word Processing Software</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Microsoft Word</strong>The most widely used — part of the Microsoft Office suite</div>
        <div class="example-item"><strong>Google Docs</strong>Free, online, and allows collaboration in real time</div>
        <div class="example-item"><strong>LibreOffice Writer</strong>Free, open-source alternative to MS Word</div>
        <div class="example-item"><strong>Corel WordPerfect</strong>Used mainly in legal and professional settings</div>
        <div class="example-item"><strong>AbiWord</strong>Lightweight free word processor</div>
        <div class="example-item"><strong>Notepad / WordPad</strong>Simple built-in Windows text editors — basic formatting only</div>

        <li><strong>Spell checking:</strong> Automatically detects and corrects spelling mistakes</li>

  s2l2: {

    title: 'Editing in MS Word', xp: 25, next: 's2l3', prev: 's2l1',
    content: `
      <p>Editing means making changes to your document — adding, deleting, moving, or replacing text. MS Word provides powerful tools to help you edit efficiently.</p>
      <h3>Basic Editing Operations</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Insert Text</strong>Click where you want to type and start. Default mode is INSERT — new text pushes existing text right</div>
        <div class="example-item"><strong>Delete Text</strong>Backspace: deletes to the LEFT of cursor · Delete key: deletes to the RIGHT of cursor</div>
        <div class="example-item"><strong>Select Text</strong>Click and drag to highlight. Ctrl+A selects ALL text. Double-click selects a word</div>
        <div class="example-item"><strong>Move Text</strong>Select → Cut (Ctrl+X) → Click new location → Paste (Ctrl+V)</div>
        <div class="example-item"><strong>Copy Text</strong>Select → Copy (Ctrl+C) → Click new location → Paste (Ctrl+V)</div>
        <div class="example-item"><strong>Overtype Mode</strong>Press Insert key to toggle: new typing replaces existing text character by character</div>
      </div>
      <h3>Find and Replace</h3>
      <p>A very powerful tool! Instead of reading through an entire document to find a word, use Find and Replace:</p>
      <div class="highlight-box"><strong>How to Use: Home Tab → Editing Group → Find & Replace (or Ctrl+H)</strong>
        1. In the "Find what" box, type the word you want to find (e.g., "colour")<br>
        2. In the "Replace with" box, type the replacement (e.g., "color")<br>
        3. Click "Replace All" to change every instance at once
      </div>
      <h3>Spell Check, Grammar & Thesaurus</h3>
      <ul>
        <li><strong>Spell Check:</strong> Red wavy underline = spelling error. Right-click for suggestions. Or: Review tab → Spelling & Grammar</li>
        <li><strong>Grammar Check:</strong> Blue underline = grammar suggestion. Review tab → Spelling & Grammar checks both</li>
        <li><strong>Thesaurus:</strong> Find synonyms (words with similar meanings). Review tab → Thesaurus, or right-click a word → Synonyms</li>
        <li><strong>Language/Translation:</strong> Review tab → Language → Translate — can translate selected text</li>
      </ul>
      <h3>Undo and Redo</h3>
      <div class="info-box"><strong>Ctrl+Z = Undo (take back your last action)</strong><br>Ctrl+Y = Redo (bring back what you just undid)<br>You can undo many steps — Word keeps a history of all your actions.</div>

  s2l3: {

    title: 'Formatting Text in MS Word', xp: 25, next: 's2l4', prev: 's2l2',
    content: `
      <p><strong>Formatting</strong> means changing the appearance of your text to make documents look professional and easy to read. MS Word's Home tab contains most formatting tools.</p>
      <h3>Text Formatting (Font Group)</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Font Type</strong>Changes the style of letters. E.g., Arial, Times New Roman, Calibri</div>
        <div class="example-item"><strong>Font Size</strong>Changes how big text appears. Measured in points (pt). Headings: 14-24pt; Body: 11-12pt</div>
        <div class="example-item"><strong>Bold (Ctrl+B)</strong>Makes text <strong>thicker and darker</strong> — used for headings and important words</div>
        <div class="example-item"><strong>Italic (Ctrl+I)</strong>Makes text <em>slanted</em> — used for titles of books, foreign words</div>
        <div class="example-item"><strong>Underline (Ctrl+U)</strong>Adds a line under text — used to emphasise words</div>
        <div class="example-item"><strong>Font Colour</strong>Changes the colour of text. Home tab → Font Colour button (A with colour)</div>
      </div>
      <h3>Text Case</h3>
      <p>Home tab → Font group → Change Case (Aa button):</p>
      <div class="example-grid">
        <div class="example-item"><strong>UPPERCASE</strong>ALL LETTERS CAPITAL — used for titles and headings</div>
        <div class="example-item"><strong>lowercase</strong>all letters small — rarely used on its own</div>
        <div class="example-item"><strong>Sentence case</strong>First letter capital, rest lowercase — normal sentences</div>
        <div class="example-item"><strong>Title Case</strong>Every First Letter Is Capitalised — used for titles</div>
      </div>
      <h3>Paragraph Formatting (Paragraph Group)</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Align Left</strong>Text lines up on the left margin (default)</div>
        <div class="example-item"><strong>Align Right</strong>Text lines up on the right margin</div>
        <div class="example-item"><strong>Centre</strong>Text is centred on the page — for headings</div>
        <div class="example-item"><strong>Justified</strong>Both left and right margins are straight — professional look for body text</div>
        <div class="example-item"><strong>Line Spacing</strong>1.0 = single, 1.5, 2.0 = double. Use Paragraph dialog box launcher</div>
        <div class="example-item"><strong>Bullets & Numbering</strong>Create lists easily. Click the bullet or number icon on Home tab</div>
      </div>
      <h3>Tabs and Indentation</h3>
      <p>Use the <strong>Tab key</strong> to indent a paragraph. You can set custom tabs (centre tab, right tab) using the ruler at the top of the document. Tabs help align text into columns without using a table.</p>
      <div class="highlight-box"><strong>Shading</strong>You can add a background colour to a paragraph using the Shading button in the Paragraph group. The Border button adds lines around paragraphs.</div>
    `,

  s2l6: {
    strand: 'Strand 2: Productivity Software', sub: 'Sub-strand 3: Spreadsheets',
    title: 'Introduction to Spreadsheets', xp: 20, next: 's2l7', prev: 's2l5',
    content: `
      <p>A <strong>spreadsheet</strong> is software used to organise, store, and analyse data in a grid of rows and columns. It is one of the most powerful tools for working with numbers.</p>
      <div class="highlight-box"><strong>Definition</strong>A spreadsheet is an electronic document made up of rows and columns where you can enter data and perform calculations automatically.</div>
      <h3>Common Spreadsheet Software</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Microsoft Excel</strong>Most widely used. Part of Microsoft Office</div>
        <div class="example-item"><strong>Google Sheets</strong>Free, online, collaborative — works in a browser</div>
        <div class="example-item"><strong>LibreOffice Calc</strong>Free, open-source alternative</div>
        <div class="example-item"><strong>Lotus 1-2-3</strong>Historic spreadsheet — one of the first popular ones</div>
      </div>
      <h3>Key Terms in MS Excel</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Cell</strong>The intersection of a row and column. Named by Column Letter + Row Number. E.g., A1, B3, C10</div>
        <div class="example-item"><strong>Row</strong>Horizontal — numbered 1, 2, 3... going down the screen</div>
        <div class="example-item"><strong>Column</strong>Vertical — lettered A, B, C... going across the screen</div>
        <div class="example-item"><strong>Worksheet</strong>A single spreadsheet page (like a sheet of paper)</div>
        <div class="example-item"><strong>Workbook</strong>The entire Excel file — can contain multiple worksheets (tabs at the bottom)</div>
        <div class="example-item"><strong>Active Cell</strong>The currently selected cell — shown with a green border</div>
      </div>
      <h3>Cell Data Types</h3>
      <p>Each cell can hold different types of data. Right-click → Format Cells to set the type:</p>
      <div class="example-grid">
        <div class="example-item"><strong>General</strong>Default — Excel guesses the type</div>

    content: `
      <p>The real power of Excel is its ability to <strong>perform calculations automatically</strong>. Instead of using a calculator, you write a formula in a cell and Excel computes the answer instantly.</p>
      <div class="highlight-box"><strong>Golden Rule</strong>All formulas in Excel MUST start with the equals sign (=). Excel sees anything starting with = as a formula to calculate.</div>
      <h3>Basic Formulas</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Addition =A1+B1</strong>Adds the values in A1 and B1. Could also be =5+3</div>
        <div class="example-item"><strong>Subtraction =A1-B1</strong>Subtracts B1 from A1</div>
        <div class="example-item"><strong>Multiplication =A1*B1</strong>Multiplies A1 by B1 (* is the multiply symbol)</div>
        <div class="example-item"><strong>Division =A1/B1</strong>Divides A1 by B1 (/ is the divide symbol)</div>
      </div>
      <h3>Common Functions</h3>
      <p>Functions are built-in formulas that do common tasks:</p>
      <div class="example-grid">
        <div class="example-item"><strong>=SUM(A1:A10)</strong>Adds all numbers from A1 to A10. The colon (:) means "through"</div>
        <div class="example-item"><strong>=AVERAGE(B1:B5)</strong>Calculates the average of B1 through B5</div>
        <div class="example-item"><strong>=MAX(C1:C10)</strong>Returns the highest value in the range</div>
        <div class="example-item"><strong>=MIN(C1:C10)</strong>Returns the lowest value in the range</div>
        <div class="example-item"><strong>=COUNT(A1:A10)</strong>Counts how many cells contain numbers</div>
        <div class="example-item"><strong>=IF(A1>50,"Pass","Fail")</strong>Logic: if A1 is more than 50, show "Pass", otherwise show "Fail"</div>
      </div>
      <h3>AutoFill</h3>
      <p>AutoFill saves time by automatically filling in patterns:</p>
      <ul>
        <li>Type "Monday" in a cell → drag the fill handle (small green square, bottom-right of cell) down → Excel automatically fills Tuesday, Wednesday, Thursday...</li>
        <li>Type "January" → drag → February, March, April...</li>
        <li>Type 1, 2 in two cells → select both → drag → 3, 4, 5, 6...</li>
        <li>Odd numbers: type 1, 3 → drag → 5, 7, 9...</li>

      <h3>Setting Up Headers and Footers</h3>
      <p>Go to Insert tab → Header & Footer. You can add the page number, current date, file name, and other info that appears on every printed page.</p>
      <div class="info-box"><strong>Practical Example</strong>If a class has 10 students and their scores are in B1:B10, you can:<br>

      • =AVERAGE(B1:B10) → Average score<br>
      • =MAX(B1:B10) → Highest mark<br>

  s3l1: {

    title: 'Network Topologies', xp: 25, next: 's3l2', prev: 's2l7',
    content: `
      <p>A <strong>computer network</strong> is a group of computers and devices connected together to share resources and communicate. The arrangement of these connections is called a <strong>topology</strong>.</p>
      <div class="highlight-box"><strong>Key Hardware for Networks</strong>Server · Client computers · Hub · Switch · Router · Cables (Ethernet) · Wireless Access Points</div>
      <h3>The Four Main Network Topologies</h3>
      <h3>1. Bus Topology</h3>
      <p>All devices connect to a single central cable (the "bus" or backbone).</p>
      <div class="example-grid">
        <div class="example-item"><strong>✅ Advantages</strong>Simple and cheap to set up · Easy to add new devices · Uses less cable than other types</div>
        <div class="example-item"><strong>❌ Disadvantages</strong>If the main cable breaks, the ENTIRE network fails · Gets slow as more devices are added · Hard to troubleshoot</div>
      </div>
      <h3>2. Star Topology</h3>
      <p>All devices connect to a central hub or switch. Most common in schools and offices today.</p>
      <div class="example-grid">
        <div class="example-item"><strong>✅ Advantages</strong>If one cable fails, other devices still work · Easy to add or remove devices · Fast performance · Easy to troubleshoot</div>
        <div class="example-item"><strong>❌ Disadvantages</strong>If the central hub/switch fails, the WHOLE network fails · Requires more cable than bus · Hub/switch can be expensive</div>
      </div>
      <h3>3. Ring Topology</h3>
      <p>Each device connects to exactly two other devices, forming a closed loop (ring).</p>
      <div class="example-grid">
        <div class="example-item"><strong>✅ Advantages</strong>Data travels in one direction — predictable performance · No data collisions · Works well for high-speed data transfer</div>
        <div class="example-item"><strong>❌ Disadvantages</strong>If one device or cable fails, the entire ring breaks · Adding new devices disrupts the network · Slower than star for large networks</div>
      </div>
      <h3>4. Mesh Topology</h3>
      <p>Every device connects directly to every other device — many paths for data to travel.</p>
      <div class="example-grid">
        <div class="example-item"><strong>✅ Advantages</strong>Very reliable — if one path fails, data uses another · Excellent security · Best for critical systems</div>
        <div class="example-item"><strong>❌ Disadvantages</strong>Very expensive — needs a lot of cables · Complex to set up and maintain · Not practical for large networks</div>
      </div>
      <div class="info-box"><strong>Most Common Today</strong>Star topology is by far the most widely used in schools, homes, and offices. Your school computer lab likely uses a star topology with a central switch.</div>
    `,

      <p><strong>Information security</strong> (InfoSec) is the practice of protecting information from being accessed, changed, or destroyed by unauthorised people.</p>

    content: `
      <p><strong>Programming</strong> (or coding) is the process of writing instructions that a computer can follow to perform tasks. These instructions are written in a programming language.</p>
      <div class="highlight-box"><strong>Why Learn Programming?</strong>Programming teaches you to think logically, solve problems step-by-step, and create technology instead of just using it. These skills are valuable in every career!</div>
      <h3>Key Programming Terminology</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Program</strong>A set of instructions written in a programming language that a computer executes</div>
        <div class="example-item"><strong>Programming Language</strong>The "language" used to write programs. Examples: Python, Scratch, Java, JavaScript</div>
        <div class="example-item"><strong>Code</strong>The actual text of a program (the instructions written in a programming language)</div>

        <div class="example-item"><strong>Debugging</strong>The process of finding and fixing bugs in a program</div>

        <div class="example-item"><strong>Syntax</strong>The rules and grammar of a programming language — code must follow exact syntax to work</div>

      <h3>Common Data Types</h3>

    content: `
      <p>An <strong>algorithm</strong> is a step-by-step set of instructions to solve a problem. Every program you use was created from an algorithm — even making tea is an algorithm!</p>
      <div class="highlight-box"><strong>Definition</strong>An algorithm is a precise, finite sequence of instructions that solves a problem or performs a task.</div>
      <h3>Key Concepts</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Decomposition</strong>Breaking a large, complex problem into smaller, more manageable pieces. Example: instead of "make a game", break it into: create characters, design levels, add scoring, add sound</div>
        <div class="example-item"><strong>Abstraction</strong>Focusing only on the important details and hiding unnecessary complexity. Example: driving a car — you press the accelerator without needing to understand the engine mechanics</div>
      </div>
      <h3>Three Control Structures in Programming</h3>
      <h3>1. Sequence</h3>
      <p>Instructions are carried out ONE AFTER ANOTHER in order — like a recipe:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Example: Making Tea</strong>1. Boil water<br>2. Place teabag in cup<br>3. Pour hot water into cup<br>4. Wait 3 minutes<br>5. Remove teabag<br>6. Add sugar and milk<br>7. Drink</div>
      </div>
      <h3>2. Selection (Decision)</h3>
      <p>The program CHOOSES between options based on a condition (if-then-else):</p>
      <div class="example-grid">
        <div class="example-item"><strong>Example:</strong>IF score >= 50<br>THEN print "Pass"<br>ELSE print "Fail"</div>
        <div class="example-item"><strong>Real life:</strong>IF it is raining<br>THEN take an umbrella<br>ELSE wear sunglasses</div>
      </div>
      <h3>3. Iteration (Loops)</h3>
      <p>Repeating a set of instructions multiple times:</p>
      <div class="example-grid">
        <div class="example-item"><strong>FOR loop</strong>Repeat a specific number of times: FOR 10 times: print "Hello"</div>
        <div class="example-item"><strong>WHILE loop</strong>Repeat while a condition is true: WHILE hungry: eat food</div>
      </div>
      <h3>Linear Search Algorithm</h3>
      <p>A linear search checks each item in a list one by one until it finds what it's looking for:</p>
      <ol>
        <li>Start at the first item in the list</li>
        <li>Is this the item I'm looking for? If YES → found! Stop</li>
        <li>If NO → move to the next item</li>
        <li>Repeat steps 2-3 until item is found or the list ends</li>
      </ol>
      <div class="info-box"><strong>Lightbot</strong>Try Lightbot (lightbot.com) — it's a free game that teaches sequence, procedures, and loops through programming puzzles without writing code!</div>
    `,

        <div class="example-item"><strong>Hybrid Hard Drive (SSHD)</strong>Combines an HDD (for large, cheap storage) with a small SSD (for frequently used files). Offers a compromise between HDD capacity and SSD speed</div>
      </div>
      <h3>Comparison Table</h3>
      <div class="example-grid">
        <div class="example-item"><strong>HDD vs SSD</strong>HDD: Slower, cheaper per GB, has moving parts, louder. SSD: Faster, more expensive per GB, no moving parts, silent and shock-resistant</div>
        <div class="example-item"><strong>SSD vs Hybrid</strong>SSD: All flash, very fast, most expensive. Hybrid: Mix of HDD and SSD, decent speed, more storage at lower cost</div>
      </div>
      <div class="info-box"><strong>Everyday Example</strong>Your phone likely uses embedded flash memory (eMMC or UFS). When you insert a MicroSD card to get more storage space, you're adding another type of flash memory. SSDs are now standard in modern laptops — they make your laptop start in seconds instead of minutes.</div>
    `,

  s1l6: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 1: Components of Computers',
    title: 'Drive Management', xp: 25, next: 's1l7', prev: 's1l5',
    content: `
      <p><strong>Drive management</strong> involves maintaining, optimising, and organising a computer's storage drives so they work efficiently. Over time, drives can become slow or disorganised — drive management helps fix this.</p>
      <h3>Disk Defragmentation</h3>
      <p>When files are saved and deleted over time, they become <strong>fragmented</strong> — broken into pieces stored in different locations on the hard disk. The read head has to travel all over the disk to collect the pieces, slowing down the computer.</p>
      <div class="highlight-box"><strong>Defragmentation</strong>The process of reorganising fragmented files so all pieces of a file are stored together, in sequential order. This makes the hard drive work faster and extends its life.<br><br>⚠️ Do NOT defragment SSDs — they work differently and defragmentation can damage them.</div>
      <h3>File Compression</h3>
      <p>Compression reduces the size of files and folders to save storage space. It works by finding and removing repetitive data patterns temporarily.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Lossless Compression</strong>Compresses without losing any data — when decompressed, the file is exactly as it was. Used for documents, programs. Examples: ZIP, RAR, 7-Zip</div>
        <div class="example-item"><strong>Lossy Compression</strong>Permanently removes some data to achieve much smaller file sizes. Used for images, audio, video where slight quality loss is acceptable. Examples: JPEG, MP3, MP4</div>
      </div>
      <h3>Disk Partitioning</h3>
      <p>Partitioning divides a single physical hard drive into two or more separate sections (partitions) that appear as different drives (e.g. C:, D:, E:).</p>
      <div class="example-grid">
        <div class="example-item"><strong>Benefits</strong>Separate OS from personal files; easier backups; install multiple operating systems (dual boot); better organisation</div>
        <div class="example-item"><strong>Primary Partition</strong>The main bootable partition where Windows is installed (usually C:). A disk can have up to 4 primary partitions</div>
        <div class="example-item"><strong>Extended Partition</strong>A special partition that can contain multiple logical drives — allows more than 4 partitions on one disk</div>
        <div class="example-item"><strong>Tools</strong>Windows Disk Management (right-click Start → Disk Management) lets you shrink, extend, create, or delete partitions</div>
      </div>
      <div class="info-box"><strong>Practical Example</strong>Many computers in Ghana have the OS on C: (50GB) and personal files on D: (rest of the disk). If Windows gets corrupted and needs reinstalling, the files on D: are safe.</div>
    `,
    quiz: [
      { q: 'What does disk defragmentation do?', opts: ['Deletes all files','Reorganises fragmented files so they are stored together, improving speed','Formats the hard drive','Compresses files'], ans: 1 },
      { q: 'Why should you NOT defragment an SSD?', opts: ['SSDs are too expensive','SSDs work differently and defragmentation can damage them','SSDs don\'t need optimisation','SSDs defragment automatically'], ans: 1 },
      { q: 'A ZIP file uses which type of compression?', opts: ['Lossy compression','Lossless compression','No compression','Quantum compression'], ans: 1 },
      { q: 'Partitioning a hard drive means:', opts: ['Breaking the disk physically','Dividing one physical disk into separate sections that act as different drives','Defragmenting the disk','Formatting the disk'], ans: 1 },
      { q: 'If Windows is on C: and personal files are on D:, what happens if you reinstall Windows?', opts: ['All files are lost','Only C: is affected; files on D: remain safe','D: is automatically deleted','Both drives are formatted'], ans: 1 }
    ]
  },

  s1l7: {

    title: 'Assistive & Adaptive Technologies', xp: 20, next: 's1l8', prev: 's1l6',
    content: `
      <p><strong>Assistive technology</strong> helps people with disabilities use computers and technology. <strong>Adaptive technology</strong> specifically adapts standard technology to meet special needs. Together, they ensure that technology is accessible to everyone.</p>
      <h3>Categories of People with Special Needs</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Visual Impairment</strong>People who are blind or have low vision. Need tools to hear or feel what is on the screen</div>
        <div class="example-item"><strong>Hearing Impairment</strong>People who are deaf or hard of hearing. Need visual alerts and captions instead of audio</div>
        <div class="example-item"><strong>Motor/Physical Impairment</strong>People who have difficulty using their hands or limbs. Need alternative input methods</div>
        <div class="example-item"><strong>Cognitive Impairment</strong>People with learning disabilities, dyslexia, or conditions like autism. Need simplified interfaces and reading support</div>
      </div>
      <h3>Assistive Technologies</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Screen Readers</strong>Software that reads everything on the screen aloud. The blind user navigates with a keyboard. Example: NVDA (free), JAWS, Windows Narrator</div>
        <div class="example-item"><strong>Screen Magnification</strong>Enlarges the screen content. Example: Windows Magnifier (Win + Plus key). Helps people with low vision</div>
        <div class="example-item"><strong>Voice Recognition</strong>Converts spoken words to text and commands. Users control the computer by speaking. Example: Dragon NaturallySpeaking, Windows Speech Recognition</div>
        <div class="example-item"><strong>Braille Display</strong>A hardware device with pins that rise and fall to form Braille text — a tactile reading device for blind users</div>
        <div class="example-item"><strong>On-Screen Keyboard</strong>A virtual keyboard on the screen — controlled by mouse, eye-tracking, or head pointer for users who cannot use a physical keyboard</div>
        <div class="example-item"><strong>Closed Captions / Subtitles</strong>Text display of spoken words in videos — helps deaf and hard-of-hearing users</div>
        <div class="example-item"><strong>High Contrast Mode</strong>Displays the screen in high-contrast colours (black background, white or yellow text) for users with visual sensitivity</div>
        <div class="example-item"><strong>Switch Access</strong>Single button or switch that replaces mouse and keyboard for users with very limited movement</div>
      </div>
      <div class="highlight-box"><strong>Inclusion in Ghana</strong>Ghana's Persons with Disability Act (Act 715, 2006) requires that public institutions make their services and technology accessible to people with disabilities. Schools and public computers should have assistive technologies available.</div>
    `,

      { q: 'A Braille Display is a hardware device that:', opts: ['Prints Braille on paper','Projects the screen in large format','Uses rising and falling pins to display Braille text for blind users to touch','Speaks text aloud'], ans: 2 }

  s1l9: {
    strand: 'Strand 1: Introduction to Computing', sub: 'Sub-strand 3: Health & Safety',
    title: 'Health & Safety at Workstations (B8)', xp: 20, next: 's2l1', prev: 's1l8',
    content: `
      <p>JHS 2 deepens our understanding of workstation health — moving beyond identifying hazards to <strong>actively managing and reducing</strong> them in practice.</p>
      <h3>Managing Health at Workstations</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Regular Breaks</strong>Take a 5-10 minute break every hour of computer use. Stand up, stretch your arms, neck, and back. Walk around briefly to improve blood circulation</div>
        <div class="example-item"><strong>Good Posture</strong>Sit upright with back fully supported. Feet flat on floor. Wrists level with keyboard. Head upright — not leaning forward. Elbows at 90 degrees</div>
        <div class="example-item"><strong>Document Holder</strong>Place documents at the same height and distance as the monitor. Prevents constantly looking down at the desk, which strains the neck. Keeps the neck neutral and aligned</div>
        <div class="example-item"><strong>Eye Care</strong>Use the 20-20-20 rule. Ensure the monitor is not in front of a bright window (glare). Use anti-glare screen protectors or blue-light-filtering glasses</div>
      </div>
      <h3>Risk Reduction Safety Measures</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Volume Control</strong>Keep speaker and earpiece volumes below 60% of maximum. Loud volumes for long periods cause permanent hearing damage. Use noise-cancelling headphones to avoid turning up volume in noisy places</div>
        <div class="example-item"><strong>Screen Protectors & Spectacles</strong>Anti-glare screen protectors reduce harsh light from monitors. Blue-light-filtering spectacles (glasses) reduce eye strain, especially during night-time computer use</div>
        <div class="example-item"><strong>Electrical Safety</strong>Do NOT overload electric sockets with multiple plug adapters. Instead, use a trailing multi-socket unit (power strip with surge protection). Check cables regularly for damage</div>
        <div class="example-item"><strong>Cable Management</strong>Keep cables organised and secured to walls or desks. Loose cables on the floor are a serious tripping hazard in computer labs</div>
      </div>
      <div class="highlight-box"><strong>Multi-Socket Units vs Plug Adapters</strong>A plug adapter (cube-shaped device that converts one socket to three) is dangerous because it concentrates too much load in one socket. A trailing multi-socket unit (power strip) distributes the load safely and usually includes a surge protector that cuts power if there's a spike.</div>
      <div class="info-box"><strong>Workstation Risk Assessment</strong>Evaluate your workstation: Is the chair adjustable? Is the screen at eye level? Are cables managed? Is there glare on the screen? Can you take regular breaks? Fix any issues you find!</div>
    `,

      { q: 'How often should you take a break from computer work?', opts: ['Every 5 minutes','Every 30 minutes','Every hour (5-10 min break)','Every 3 hours'], ans: 2 }

    content: `
      <p>JHS 2 Word Processing moves beyond basic text editing to <strong>tables</strong> for structured data and <strong>hyperlinks</strong> for creating interactive, non-linear documents.</p>
      <h3>Creating Tables in MS Word</h3>
      <p>Tables organise information into rows and columns — perfect for schedules, timetables, comparison charts, and report data.</p>
      <div class="highlight-box"><strong>How to Insert a Table</strong>Insert tab → Tables group → Table → Move mouse to choose rows and columns, OR click "Insert Table" to specify exact numbers</div>
      <h3>Working with Tables</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Adding Rows/Columns</strong>Right-click inside table → Insert → Insert Rows Above/Below or Insert Columns Left/Right</div>
        <div class="example-item"><strong>Deleting Rows/Columns</strong>Select row/column → Right-click → Delete Rows or Delete Columns</div>
        <div class="example-item"><strong>Resizing Columns</strong>Drag the column border to resize. Or: Table Tools → Layout → Cell Size → set exact width</div>
        <div class="example-item"><strong>Table Borders & Shading</strong>Table Tools → Design tab → Borders (add/remove lines) and Shading (add background colour to cells)</div>
        <div class="example-item"><strong>Merging Cells</strong>Select cells → Table Tools → Layout → Merge Cells — combines multiple cells into one large cell (useful for headers)</div>
        <div class="example-item"><strong>Splitting Cells</strong>Select cell → Table Tools → Layout → Split Cells — divides one cell into multiple rows or columns</div>
      </div>
      <h3>Formulas in Tables</h3>
      <p>You can perform simple calculations inside Word tables:</p>
      <ul>
        <li>Click in the cell where you want the result</li>
        <li>Table Tools → Layout → Data group → Formula</li>
        <li>Common: =SUM(ABOVE) adds all numbers above; =SUM(LEFT) adds numbers to the left</li>
        <li>Unlike Excel, Word table formulas do NOT update automatically when data changes — you must press F9 to refresh</li>
      </ul>
      <h3>Hyperlinks</h3>
      <p>A <strong>hyperlink</strong> is clickable text or image that jumps to another location — a website, another part of the document, an email address, or another file.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Insert Hyperlink</strong>Select text → Insert tab → Links group → Hyperlink (or Ctrl+K). Type the URL or file path in the Address field</div>
        <div class="example-item"><strong>Internal Links (Bookmarks)</strong>Create a Bookmark at a location in the document, then link to it from elsewhere — creates non-linear navigation (like a webpage)</div>
        <div class="example-item"><strong>Email Hyperlink</strong>Set "Link to: Email Address" — clicking the link opens the user's email app with the address pre-filled</div>
        <div class="example-item"><strong>Non-linear Presentation</strong>Use internal hyperlinks to let readers jump between sections — e.g. a table of contents where each heading is a clickable link</div>
      </div>
    `,
