      <p>Professional documents require precise page layout control. This lesson covers advanced page formatting techniques in MS Word.</p>
      <h3>Page Formatting Basics</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Page Orientation</strong>Portrait (vertical — taller than wide, default) or Landscape (horizontal — wider than tall). Layout tab → Orientation</div>
        <div class="example-item"><strong>Page Size</strong>A4 is standard in Ghana and most of Africa (210mm × 297mm). Layout tab → Size</div>
        <div class="example-item"><strong>Margins</strong>The blank space around the edges of a page. Layout tab → Margins. Normal = 2.54cm on all sides</div>
        <div class="example-item"><strong>Page Breaks</strong>Forces text to start on a new page. Insert tab → Pages → Page Break (or Ctrl+Enter). Useful for chapters and new sections</div>
      </div>
      <h3>Headers and Footers</h3>
      <p>Headers appear at the top of every page; footers appear at the bottom. Useful for document titles, page numbers, author names, and dates.</p>
      <div class="highlight-box"><strong>How to Insert: Insert tab → Header & Footer group → Header or Footer</strong>Choose a built-in style, or click "Edit Header/Footer" to create your own. Press Esc or double-click outside to exit header/footer editing mode.</div>
      <div class="example-grid">
        <div class="example-item"><strong>Page Numbers</strong>Insert tab → Header & Footer → Page Number. Choose position: top of page, bottom of page, or page margins</div>
        <div class="example-item"><strong>Different First Page</strong>In Header/Footer tools → tick "Different First Page" so the title page has no header/footer</div>
        <div class="example-item"><strong>Different Odd & Even Pages</strong>Different headers for left and right pages — useful for books and formal reports</div>
        <div class="example-item"><strong>Section Breaks</strong>Allows different formatting in different parts of the same document (e.g. one section portrait, another landscape). Layout tab → Breaks → Section Breaks</div>
      </div>
      <h3>Table Formatting: Borders and Shading</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Borders</strong>Home tab → Paragraph group → Borders button (dropdown arrow). Add borders to paragraphs, not just tables. Can choose box, shadow, 3D, custom styles</div>
        <div class="example-item"><strong>Shading</strong>Home tab → Paragraph group → Shading button (paint bucket icon). Adds background colour to selected paragraph or cell</div>
        <div class="example-item"><strong>Line Spacing</strong>Home tab → Paragraph group → Line Spacing button, or use the Paragraph dialog box launcher (small arrow at bottom right of Paragraph group)</div>
        <div class="example-item"><strong>Indentation</strong>Home tab → Paragraph group → Increase/Decrease Indent. Or drag the indent markers on the ruler. Creates structured, hierarchical text</div>
      </div>
    `,

      <p>JHS 2 moves beyond basic SUM and AVERAGE to explore the full range of Excel functions and the difference between <strong>formulas</strong> and <strong>functions</strong>.</p>
      <div class="highlight-box"><strong>Formulas vs Functions</strong>A formula is any calculation you write starting with = (e.g. =A1+B1+C1). A function is a pre-built formula with a name (e.g. =SUM(A1:C1) does the same thing faster and more clearly.</div>
      <h3>Common Spreadsheet Functions</h3>
      <div class="example-grid">
        <div class="example-item"><strong>=SUM(range)</strong>Adds all numbers in the specified range. =SUM(A1:A10) adds A1 through A10</div>
        <div class="example-item"><strong>=AVERAGE(range)</strong>Calculates the arithmetic mean. =AVERAGE(B1:B30) — sum divided by count</div>
        <div class="example-item"><strong>=COUNT(range)</strong>Counts cells that contain NUMBERS only. Empty cells and text are ignored</div>
        <div class="example-item"><strong>=COUNTA(range)</strong>Counts ALL non-empty cells — including text, numbers, and dates. More versatile than COUNT</div>
        <div class="example-item"><strong>=COUNTIF(range, criteria)</strong>Counts cells that meet a condition. =COUNTIF(A1:A30,"Pass") counts how many cells say "Pass"</div>
        <div class="example-item"><strong>=MAX(range)</strong>Returns the largest value in the range</div>
        <div class="example-item"><strong>=MIN(range)</strong>Returns the smallest value in the range</div>
        <div class="example-item"><strong>=IF(condition, value_if_true, value_if_false)</strong>=IF(B2>=50,"Pass","Fail") — checks condition and returns different results</div>
      </div>
      <h3>Complex Formulas</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Percentage</strong>=(Score/Total)*100 → e.g. =(45/60)*100 = 75%</div>
        <div class="example-item"><strong>Commission</strong>=SalesAmount*CommissionRate → e.g. =B2*0.05 (5% commission)</div>
        <div class="example-item"><strong>Simple Interest</strong>=Principal*Rate*Time → I = PRT → e.g. =1000*0.15*2 = GH₵300</div>
        <div class="example-item"><strong>Compound Interest</strong>=Principal*(1+Rate)^Time → e.g. =1000*(1+0.15)^2 = GH₵1,322.50</div>
        <div class="example-item"><strong>VAT Calculation</strong>=Price*1.15 (adds 15% VAT) or =Price*0.15 for the VAT amount only</div>
        <div class="example-item"><strong>Nested IF</strong>=IF(B2>=70,"A",IF(B2>=60,"B",IF(B2>=50,"C","F"))) — grades based on score</div>

      <div class="info-box"><strong>Practical: Class Report Card</strong>Create a spreadsheet with student names, subject scores, and use SUM for total, AVERAGE for average, MAX for highest, MIN for lowest, and IF to assign Pass/Fail. COUNTIF can count how many passed!</div>

  s2l8: {
    strand: 'Strand 2: Productivity Software', sub: 'Sub-strand 4: Spreadsheets',
    title: 'Cell References & Copying Formulas', xp: 30, next: 's3l1', prev: 's2l7',
    content: `
      <p>One of Excel's most powerful features is the ability to copy formulas across many cells. Understanding <strong>cell referencing</strong> is essential for doing this correctly.</p>
      <h3>Types of Cell References</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Relative Reference (e.g., A1)</strong>Changes automatically when a formula is copied to another cell. If =A1+B1 is copied one row down, it becomes =A2+B2. This is the DEFAULT behaviour in Excel</div>
        <div class="example-item"><strong>Absolute Reference (e.g., $A$1)</strong>Does NOT change when copied — always points to the exact same cell. The $ sign "locks" the row and/or column. Press F4 to add $ signs quickly</div>
        <div class="example-item"><strong>Mixed Reference (e.g., $A1 or A$1)</strong>$A1: Column A is locked, row changes. A$1: Row 1 is locked, column changes. Useful for multiplication tables and complex models</div>
      </div>
      <h3>When to Use Each</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Use Relative (A1)</strong>When applying the same formula to multiple rows or columns of similar data — student scores, product prices</div>
        <div class="example-item"><strong>Use Absolute ($A$1)</strong>When a formula refers to a fixed value used by all rows — a VAT rate, commission percentage, or exchange rate in one cell</div>
      </div>
      <h3>Copying and Pasting Formulas</h3>
      <ul>
        <li>Copy a cell with Ctrl+C → Select destination cells → Paste with Ctrl+V</li>
        <li>Or use the AutoFill handle (green square at bottom-right of cell) to drag and copy</li>
        <li><strong>Paste Special:</strong> Ctrl+Alt+V → allows pasting just the value (not the formula), just the format, or just the formula</li>
      </ul>
      <h3>Common Formula Errors</h3>
      <div class="example-grid">
        <div class="example-item"><strong>#DIV/0!</strong>Division by zero error. Check that the divisor cell is not empty or zero</div>
        <div class="example-item"><strong>#VALUE!</strong>Wrong data type — trying to do maths on a cell containing text</div>
        <div class="example-item"><strong>#REF!</strong>Invalid cell reference — usually caused by deleting a cell that was referenced in a formula</div>
        <div class="example-item"><strong>#NAME?</strong>Unrecognised function name — check spelling of the function</div>
        <div class="example-item"><strong>#N/A</strong>Value not available — common in lookup functions when a value is not found</div>
        <div class="example-item"><strong>Circular Reference</strong>A formula refers to its own cell — causes an endless loop. Excel warns you</div>
      </div>
      <div class="highlight-box"><strong>Practical: VAT Calculator</strong>Put VAT rate (e.g. 0.15) in cell B1. In A3:A10, list product prices. In B3, type =A3*$B$1. Copy down to B10. The $B$1 absolute reference ensures all formulas use the same VAT rate in B1, even when copied.</div>
    `,

      { q: 'If =A1+B1 is copied one row down, it becomes:', opts: ['=$A$1+$B$1','=A1+B1 (no change)','=A2+B2','=A0+B0'], ans: 2 },

      { q: 'Paste Special (Ctrl+Alt+V) allows you to:', opts: ['Only paste text','Only paste from the clipboard once','Paste just the value, just the format, or just the formula separately','Paste into multiple files at once'], ans: 2 }

  s3l1: {
    strand: 'Strand 3: Communication Networks', sub: 'Sub-strand 1: Computer Networks',
    title: 'The OSI Model', xp: 30, next: 's3l2', prev: 's2l8',
    content: `
      <p>The <strong>OSI Model (Open Systems Interconnection)</strong> is a conceptual framework that standardises how different computers and network devices communicate with each other — even if they come from different manufacturers.</p>
      <div class="highlight-box"><strong>Why OSI?</strong>Before OSI, devices from different companies couldn't communicate. The OSI model creates common rules (like a universal language) so that a Windows computer can talk to a Mac, which can talk to an Android phone, across any network.</div>
      <h3>The 7 Layers of the OSI Model</h3>
      <p>Remember the layers using: <strong>"Please Do Not Throw Sausage Pizza Away"</strong> (from bottom to top: Physical, Data Link, Network, Transport, Session, Presentation, Application)</p>
      <div class="example-grid">
        <div class="example-item"><strong>Layer 7: Application</strong>The layer closest to the user. Provides network services to applications. Examples: HTTP (web browsing), SMTP (email), FTP (file transfer)</div>
        <div class="example-item"><strong>Layer 6: Presentation</strong>Translates data formats — encryption, compression, and data conversion. Ensures sender and receiver understand each other's data format</div>
        <div class="example-item"><strong>Layer 5: Session</strong>Manages connections (sessions) between computers — establishes, maintains, and terminates communication sessions</div>
        <div class="example-item"><strong>Layer 4: Transport</strong>Ensures reliable data transfer — breaks data into segments, manages flow control and error correction. Protocols: TCP (reliable), UDP (fast, no guarantee)</div>
        <div class="example-item"><strong>Layer 3: Network</strong>Handles logical addressing and routing — decides the best path for data to travel. The IP address works at this layer. Device: Router</div>
        <div class="example-item"><strong>Layer 2: Data Link</strong>Handles physical addressing (MAC addresses) and error detection. Manages access to the physical medium. Devices: Switch, Bridge</div>
        <div class="example-item"><strong>Layer 1: Physical</strong>The actual physical cables, signals, and hardware — electrical signals, light pulses, radio waves. Devices: Cables, Hubs, Repeaters</div>
      </div>
      <div class="info-box"><strong>Interoperability</strong>The OSI model means that a TP-Link router (Chinese brand), a Samsung phone, and a Dell laptop (American brands) can all communicate on the same network in Ghana — because they all follow the same OSI standards.</div>
    `,
    quiz: [
      { q: 'How many layers does the OSI model have?', opts: ['4','5','6','7'], ans: 3 },

      <p>Many people use "internet" and "World Wide Web" interchangeably — but they are different things! This lesson clarifies the key concepts of internet infrastructure.</p>
      <h3>Internet vs World Wide Web</h3>
      <div class="example-grid">
        <div class="example-item"><strong>The Internet</strong>The global physical network infrastructure — the cables, routers, and wireless connections linking billions of devices worldwide. It is the "highway"</div>
        <div class="example-item"><strong>The World Wide Web (WWW)</strong>A service that runs ON the internet — a collection of web pages and websites accessed using a browser (Chrome, Firefox). It is one of many services using the internet highway. Email, WhatsApp, and online gaming also use the internet but are NOT the WWW</div>
      </div>
      <h3>IP Addresses</h3>
      <p>Every device on the internet has a unique <strong>IP (Internet Protocol) address</strong> — like a postal address for computers.</p>
      <div class="example-grid">
        <div class="example-item"><strong>IPv4</strong>The original format: 4 groups of numbers separated by dots. Example: 192.168.1.1. Range: 0-255 for each group. Maximum ~4.3 billion unique addresses — now mostly exhausted</div>
        <div class="example-item"><strong>IPv6</strong>The new format: 8 groups of hexadecimal characters separated by colons. Example: 2001:0db8:85a3:0000:0000:8a2e:0370:7334. Provides 340 undecillion unique addresses — virtually unlimited</div>
      </div>
      <h3>Domain Name System (DNS)</h3>
      <p>IP addresses are hard to remember. DNS is like the internet's phonebook — it converts human-readable domain names into IP addresses.</p>
      <div class="highlight-box"><strong>How DNS Works</strong>When you type "www.ghanaweb.com" in your browser:<br>
      1. Your computer asks the DNS server "What is the IP address of ghanaweb.com?"<br>
      2. The DNS server responds with the IP address (e.g. 41.78.5.30)<br>
      3. Your browser connects to that IP address and loads the website<br>
      You see the name; the computer uses the number.</div>
      <h3>Classes of Internet Addresses (IPv4)</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Class A</strong>1.0.0.0 – 127.255.255.255. Very large networks — used by major companies like IBM</div>
        <div class="example-item"><strong>Class B</strong>128.0.0.0 – 191.255.255.255. Medium-sized networks — universities and large organisations</div>
        <div class="example-item"><strong>Class C</strong>192.0.0.0 – 223.255.255.255. Small networks — most homes and small businesses</div>
        <div class="example-item"><strong>Private Addresses</strong>192.168.x.x addresses are used inside local networks (home, school) and are not visible on the internet</div>
      </div>
    `,

  s3l4: {

    title: 'The Four Major Data Threats', xp: 25, next: 's3l5', prev: 's3l3',
    content: `
      <p>Data is constantly at risk of being attacked, corrupted, or stolen when transmitted across networks. Understanding the specific types of threats helps us choose the right protection methods.</p>
      <div class="highlight-box"><strong>The Four Major Data Threats</strong>Interruption · Interception · Modification · Fabrication</div>
      <h3>1. Interruption</h3>
      <p>The transmission path is disrupted — data cannot reach its destination. Availability is destroyed.</p>
      <div class="example-grid">
        <div class="example-item"><strong>What happens</strong>Data flows from sender to receiver, but the path is cut off. The receiver gets nothing</div>
        <div class="example-item"><strong>Examples</strong>DDoS attack (Distributed Denial of Service) — floods a server with traffic until it crashes; cutting a network cable; destroying a switch</div>
      </div>
      <h3>2. Interception</h3>
      <p>An unauthorised party gains access to data while it's in transit. Confidentiality is broken.</p>
      <div class="example-grid">
        <div class="example-item"><strong>What happens</strong>Data flows from sender to receiver, BUT an attacker secretly copies or reads it</div>
        <div class="example-item"><strong>Examples</strong>Eavesdropping on Wi-Fi (packet sniffing); man-in-the-middle attacks; tapping phone lines; stealing login credentials over unsecured networks</div>
      </div>
      <h3>3. Modification</h3>
      <p>An attacker intercepts AND changes the data before it reaches the receiver. Integrity is compromised.</p>
      <div class="example-grid">
        <div class="example-item"><strong>What happens</strong>The data is altered in transit — the receiver gets incorrect data without knowing it was changed</div>
        <div class="example-item"><strong>Examples</strong>Changing a bank transfer amount in transit; altering exam results being sent digitally; changing a contract document mid-transmission</div>
      </div>
      <h3>4. Fabrication</h3>
      <p>An attacker creates false data and inserts it into the system, pretending to be a legitimate source. Authenticity is attacked.</p>
      <div class="example-grid">
        <div class="example-item"><strong>What happens</strong>The receiver gets completely fake data they believe is genuine</div>
        <div class="example-item"><strong>Examples</strong>Phishing emails pretending to be from your bank; fake login pages (spoofed websites); counterfeit digital certificates; fake news distributed as a legitimate news source</div>
      </div>
      <div class="warning-box"><strong>Real Examples in Ghana</strong>Mobile money fraud in Ghana often involves fabrication — criminals send fake SMS messages claiming to be MTN or Vodafone asking for your PIN. Never share your PIN in response to any message!</div>
    `,

  s3l5: {

    content: `
      <p>For each of the four data threats, there are specific protection methods. Understanding which protection matches which threat is key to effective security.</p>
      <h3>Protection Methods Mapped to Threats</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Threat: Interruption → Authorisation</strong>Authorisation ensures only legitimate users and systems can access the network. Access control lists (ACLs), firewalls, and network monitoring prevent attackers from disrupting services. Backups and redundant systems help recover from outages</div>
        <div class="example-item"><strong>Threat: Interception → Encryption</strong>Encryption scrambles data so that even if intercepted, the attacker cannot read it. Only someone with the correct key can decrypt and read the data. HTTPS websites use encryption. End-to-end encryption in WhatsApp protects your messages</div>
        <div class="example-item"><strong>Threat: Modification → Authentication + Encryption</strong>Authentication verifies the identity of both sender and receiver (ensures you're talking to the real party, not an attacker in the middle). Digital signatures and checksums verify data hasn't been changed</div>
        <div class="example-item"><strong>Threat: Fabrication → Authentication</strong>Authentication ensures you can verify the source of the data. Examples: two-factor authentication (2FA), digital certificates (HTTPS padlock), CAPTCHA, biometric login</div>
      </div>
      <h3>Key Security Concepts in Detail</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Encryption</strong>Converts plaintext (readable) into ciphertext (scrambled) using an algorithm and key. Only the holder of the decryption key can reverse it. Types: symmetric (same key both ways), asymmetric (public/private key pair)</div>
        <div class="example-item"><strong>Decryption</strong>The reverse of encryption — converting ciphertext back to readable plaintext using the correct key</div>
        <div class="example-item"><strong>Authentication</strong>Verifying identity. Methods: passwords, PINs, biometrics (fingerprint, face), security tokens, digital certificates</div>
        <div class="example-item"><strong>Two-Factor Authentication (2FA)</strong>Requires two forms of identity: something you KNOW (password) + something you HAVE (OTP code sent to your phone). Makes accounts much harder to hack</div>
        <div class="example-item"><strong>Firewall</strong>A barrier between your network and external threats — blocks unauthorised access while allowing legitimate traffic</div>
        <div class="example-item"><strong>VPN (Virtual Private Network)</strong>Creates an encrypted tunnel for your internet traffic — hides your activity and protects data on public Wi-Fi</div>
      </div>
      <div class="highlight-box"><strong>HTTPS vs HTTP</strong>The padlock icon in your browser means the website uses HTTPS — data between you and the website is encrypted. Never enter passwords or payment details on HTTP (no padlock) websites.</div>
    `,

    content: `
      <p>Just like in mathematics, computers follow strict rules about which operations to perform first when evaluating expressions. This is called <strong>operator precedence</strong>.</p>
      <div class="highlight-box"><strong>BODMAS Rule</strong>Brackets → Orders (Powers/Roots) → Division → Multiplication → Addition → Subtraction<br>Computers follow the same rule! This is why understanding BODMAS is essential for programming.</div>
      <h3>Operator Precedence in Programming</h3>
      <div class="example-grid">
        <div class="example-item"><strong>1. Brackets ( )</strong>Highest priority — always calculated first. Example: (2 + 3) * 4 = 5 * 4 = 20</div>
        <div class="example-item"><strong>2. Powers **</strong>Exponents/powers next. Example: 2 ** 3 = 8, calculated before multiplication</div>
        <div class="example-item"><strong>3. Multiplication * and Division /</strong>Equal priority — evaluated left to right. Example: 6 / 2 * 3 = 3 * 3 = 9</div>
        <div class="example-item"><strong>4. Addition + and Subtraction -</strong>Lowest priority — last to be calculated. Example: 5 + 3 - 2 = 6</div>
      </div>
      <h3>Worked Examples</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Example 1: 2 + 3 * 4</strong>Step 1: 3 * 4 = 12 (multiplication first)<br>Step 2: 2 + 12 = 14<br>Result: 14 (NOT 20)</div>
        <div class="example-item"><strong>Example 2: (2 + 3) * 4</strong>Step 1: (2 + 3) = 5 (brackets first)<br>Step 2: 5 * 4 = 20<br>Result: 20</div>
        <div class="example-item"><strong>Example 3: 10 - 2 ** 3 + 4</strong>Step 1: 2 ** 3 = 8 (powers)<br>Step 2: 10 - 8 + 4 (left to right)<br>Step 3: 2 + 4 = 6<br>Result: 6</div>
        <div class="example-item"><strong>Example 4: 20 / 4 * 2</strong>Equal priority, left to right:<br>Step 1: 20 / 4 = 5<br>Step 2: 5 * 2 = 10<br>Result: 10</div>
      </div>
      <h3>Assignment Statements</h3>
      <p>An assignment statement stores a value in a variable. The right side is always evaluated FIRST using BODMAS, then stored in the variable on the left:</p>
      <div class="example-grid">
        <div class="example-item"><strong>x = 5 + 3 * 2</strong>Right side: 3*2=6, then 5+6=11. So x = 11</div>
        <div class="example-item"><strong>area = length * width</strong>Evaluates length * width first, then stores the result in area</div>
        <div class="example-item"><strong>score = score + 10</strong>Takes current value of score, adds 10, stores back in score</div>
        <div class="example-item"><strong>average = (a + b + c) / 3</strong>Brackets first: add a+b+c, then divide by 3</div>
      </div>
    `,
    quiz: [

      { q: 'What is the result of (2 + 3) * 4?', opts: ['14','9','20','24'], ans: 2 },

  s4l3: {

    title: 'Flowcharts & Algorithms', xp: 30, next: 's4l4', prev: 's4l2',
    content: `
      <p>JHS 2 algorithms build on JHS 1's concepts of sequence, selection, and iteration by introducing <strong>flowcharts</strong> — visual diagrams that represent algorithms using standard symbols.</p>
      <div class="highlight-box"><strong>What is a Flowchart?</strong>A flowchart is a diagram using standardised shapes connected by arrows to show the step-by-step logic of a process or program.</div>
      <h3>The Four Basic Flowchart Symbols</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Oval / Rounded Rectangle</strong>Start / Stop (Terminal). Every flowchart has exactly ONE Start and ONE (or more) End ovals. Label them "Start" or "End/Stop"</div>
        <div class="example-item"><strong>Parallelogram</strong>Input / Output. Shows when data is entered by a user or displayed as a result. Example: "Input: Student Name", "Output: Grade"</div>
        <div class="example-item"><strong>Rectangle</strong>Process. Any calculation or action. Example: "Calculate total = price * quantity", "Set score = 0"</div>
        <div class="example-item"><strong>Diamond</strong>Decision. A YES/NO question that creates two paths. Example: "Is score >= 50?" → YES (Pass) or NO (Fail)</div>
      </div>
      <h3>Rules for Drawing Flowcharts</h3>
      <ul>
        <li>Always start and end with an oval (terminal)</li>
        <li>Use arrows to show the direction of flow</li>
        <li>Decision diamonds always have two exits: YES and NO</li>
        <li>Loops return arrows to an earlier point in the flowchart</li>
        <li>Keep text inside symbols brief and clear</li>
      </ul>
      <h3>Real-World Flowchart Example: Preparing Land for a Maize Farm</h3>
      <div class="example-item" style="grid-column:1/-1; background:#f0f9f4; border-color:#1D9E75;">
        <strong>Algorithm Steps:</strong><br>
        Start → Clear the land → Is the soil wet enough? → YES → Plough the land → Apply fertiliser → Plant maize seeds → Water the seeds → Is the farm fully planted? → NO → Return to "Plant maize seeds" → YES → End
      </div>
      <h3>Variables, Constants & Naming Conventions</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Good Variable Names</strong>Use descriptive names: studentScore, totalPrice, isLoggedIn. Avoid single letters like x, y (except in maths)</div>
        <div class="example-item"><strong>Naming Conventions</strong>camelCase: studentScore (Java, JavaScript) · snake_case: student_score (Python) · UPPER_CASE: MAX_SCORE (constants)</div>
        <div class="example-item"><strong>No Spaces</strong>Variable names cannot have spaces. Use underscore or camelCase: "student score" → "student_score" or "studentScore"</div>
        <div class="example-item"><strong>Cannot start with number</strong>"1score" is invalid; "score1" is valid</div>
      </div>
    `,
    quiz: [
      { q: 'Which flowchart symbol represents a DECISION?', opts: ['Oval','Rectangle','Parallelogram','Diamond'], ans: 3 },

      { q: 'Every flowchart must have exactly one:', opts: ['Decision diamond','Input symbol','Start (oval) at the beginning','Rectangle'], ans: 2 },
      { q: 'Which naming convention uses underscores between words (e.g., student_score)?', opts: ['camelCase','UPPER_CASE','snake_case','PascalCase'], ans: 2 },
      { q: 'Which variable name is INVALID?', opts: ['studentScore','total_price','MAX_LIMIT','1stScore'], ans: 3 }
    ]
  },

    content: `
      <p>JHS 2 Robotics moves from general applications (JHS 1) to understanding <strong>how robots work internally</strong> — their components, sensors, and how they interact with the environment.</p>
      <div class="highlight-box"><strong>Three Main Components of a Robot</strong>Controller (Brain) · Mechanical System (Body) · Sensors (Senses)</div>
      <h3>1. The Controller</h3>
      <p>The controller is the "brain" of the robot — a computer (microcontroller or microprocessor) that runs the program telling the robot what to do and when. It receives data from sensors, processes it, and sends commands to the mechanical parts.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Microcontroller</strong>A small, simple computer on a single chip. Used in simple robots. Examples: Arduino, Raspberry Pi Pico</div>
        <div class="example-item"><strong>Microprocessor</strong>More powerful — used in complex robots and industrial automation. Runs operating systems and advanced AI programs</div>
      </div>
      <h3>2. Mechanical System (Actuators)</h3>
      <p>The mechanical parts are what make the robot physically move and interact with the world:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Motors</strong>Convert electrical energy into rotational movement — used for wheels and joints</div>
        <div class="example-item"><strong>Pistons</strong>Convert pressure into linear (straight-line) movement — used in robotic arms and factory machines</div>
        <div class="example-item"><strong>Grippers</strong>The "hands" of a robot — grab, hold, and release objects</div>
        <div class="example-item"><strong>Wheels and Gears</strong>Allow the robot to move and change direction; gears control speed and torque</div>
      </div>
      <h3>3. Sensors — The Robot's Senses</h3>
      <p>Sensors detect the robot's environment and send data to the controller:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Light Sensor</strong>Detects presence and intensity of light. Real-life use: Street lights that turn on automatically at dusk</div>
        <div class="example-item"><strong>Temperature Sensor</strong>Measures heat. Real-life use: Smart thermostats, fever detection at airports, factory temperature control</div>
        <div class="example-item"><strong>Motion Sensor (PIR)</strong>Detects movement. Real-life use: Security systems, automatic doors, burglar alarms</div>
        <div class="example-item"><strong>Pressure Sensor</strong>Detects force or pressure. Real-life use: Car airbag deployment, automatic brakes, tyre pressure monitors</div>
        <div class="example-item"><strong>Gas Sensor</strong>Detects specific gases. Real-life use: Smoke detectors, carbon monoxide alarms, industrial pollution monitoring</div>
        <div class="example-item"><strong>Moisture/Humidity Sensor</strong>Measures water content in air or soil. Real-life use: Automatic irrigation systems for farms, weather stations</div>
        <div class="example-item"><strong>Magnetic Field Sensor</strong>Detects magnetic fields. Real-life use: Compass apps, metal detectors, MRI machines</div>
        <div class="example-item"><strong>pH Sensor</strong>Measures acidity or alkalinity. Real-life use: Water quality monitoring, swimming pool maintenance, agricultural soil testing</div>
      </div>
      <div class="info-box"><strong>Ghana Application</strong>Automatic irrigation systems using moisture sensors are being used in Ghanaian farms to detect when soil is too dry and automatically water crops — saving water and increasing yields.</div>
    `,
    quiz: [
      { q: 'What is the role of the Controller in a robot?', opts: ['It moves the robot\'s arms','It powers the motors','It is the brain — runs the program and controls all other parts','It detects the environment'], ans: 2 },

      { q: 'An automatic irrigation system for a farm uses which sensor to detect when to water crops?', opts: ['Temperature sensor','Motion sensor','Moisture/Humidity sensor','Light sensor'], ans: 2 }
    ]
  },

      <p>JHS 2 AI goes deeper — comparing intelligence across humans, animals, and machines, and exploring the difference between weak and strong AI.</p>
      <h3>Comparing Intelligence</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Human Intelligence</strong>Most complex. Can learn, reason, create, feel emotions, understand context, and adapt to completely new situations. Powered by ~86 billion neurons in the brain</div>
        <div class="example-item"><strong>Animal Intelligence</strong>Problem-solving and learning abilities varying by species. Dolphins, apes, crows, and octopuses show high intelligence. Limited by instinct; cannot reason abstractly like humans</div>
        <div class="example-item"><strong>Machine/AI Intelligence</strong>Can process data and recognise patterns much faster than humans. Lacks consciousness, emotions, and creativity. Cannot generalise learning to new contexts without retraining</div>
      </div>
      <h3>Weak AI vs Strong AI</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Weak AI (Narrow AI)</strong>Designed to perform ONE specific task very well. Has no consciousness or general understanding. Examples: Siri (voice assistant), Google Translate, chess-playing AI, face recognition</div>
        <div class="example-item"><strong>Strong AI (General AI)</strong>Hypothetical AI with human-level general intelligence — can reason, plan, and learn across ANY domain. Does NOT exist yet. Remains the long-term goal of AI research</div>
      </div>
      <h3>Artificial Neural Networks (ANN) in Depth</h3>
      <p>ANNs are inspired by the structure of the human brain:</p>
      <div class="example-grid">
        <div class="example-item"><strong>Neurons</strong>The basic processing units. Each artificial neuron receives inputs, processes them, and produces an output</div>
        <div class="example-item"><strong>Layers</strong>Input layer (receives data) → Hidden layers (process and learn patterns) → Output layer (produces the result)</div>
        <div class="example-item"><strong>Training</strong>The network learns by adjusting the strength of connections (weights) between neurons based on examples — like a student learning from practice</div>
        <div class="example-item"><strong>Deep Learning</strong>ANNs with many hidden layers — called Deep Neural Networks. Power face recognition, medical diagnosis, and autonomous vehicles</div>
      </div>
      <h3>Hologram Science & Mixed Reality</h3>
      <p>A <strong>hologram</strong> is a 3D image created using laser light — unlike a regular photograph, a hologram shows an object from multiple angles as you move around it.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Holographic Technology</strong>Uses interference patterns of laser light to create 3D images. Used in credit card security features, medical imaging, and entertainment</div>
        <div class="example-item"><strong>Mixed Reality (MR) with AI</strong>Combines holograms with AI to create interactive 3D environments where digital objects respond intelligently to the real world. Example: Microsoft HoloLens projects interactive holograms into your room</div>
        <div class="example-item"><strong>Applications</strong>Medical training (3D anatomy holograms), architecture (walk through a virtual building before it's built), education (interactive 3D models of atoms, cells, solar system)</div>
      </div>
      <div class="info-box"><strong>Future of AI in Ghana</strong>Ghana is investing in AI for education, healthcare, and agriculture. The Ghana AI Policy aims to position Ghana as an AI hub in Africa. Understanding these concepts now prepares you to participate in and lead this future.</div>

    content:`
      <p>As we look beyond fifth-generation computers, several exciting and transformative technologies are shaping the <strong>next generation</strong> of computing — machines that will be smarter, faster, and more intuitive than anything we have today.</p>
      <h3>Expected Features of Next-Generation Computers</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Quantum Supremacy Scaling</strong>Moving from Google's 53-qubit Sycamore to thousands of qubits — enabling solutions to currently unsolvable problems in medicine, logistics, and cryptography</div>
        <div class="example-item"><strong>Neuromorphic Computing</strong>Computer chips that mimic the human brain's neural structure — learning from experience in real time without reprogramming. Uses far less energy than traditional chips</div>
        <div class="example-item"><strong>Photonic Computing</strong>Using light (photons) instead of electrons to transmit and process data — operating at the speed of light with almost no heat generation</div>
        <div class="example-item"><strong>Bio-Computing</strong>Using DNA molecules to store data (1 gram of DNA = 215 petabytes!) and biological cells to perform computations</div>
        <div class="example-item"><strong>Ubiquitous Computing</strong>Computing embedded everywhere — in walls, clothing, furniture, roads — the "Internet of Things" taken to its extreme</div>
        <div class="example-item"><strong>Brain-Computer Interfaces</strong>Direct connections between the human brain and computers (e.g. Neuralink) — allowing thought-controlled computers for disabled people and beyond</div>
      </div>
      <h3>Google Sycamore vs Supercomputers</h3>
      <p>In 2019, Google's Sycamore quantum processor performed a specific computation in <strong>200 seconds</strong> that IBM's Summit — the world's most powerful classical supercomputer at the time — was estimated to take <strong>10,000 years</strong>.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Sycamore (Quantum)</strong>53 qubits · Uses quantum superposition and entanglement · Processor operates near absolute zero (−273°C) · Solves specific quantum problems</div>
        <div class="example-item"><strong>Summit (Classical Supercomputer)</strong>200 petaflops · 9,216 IBM POWER9 CPUs + 27,648 NVIDIA GPUs · Uses classical bits · General purpose, runs any software</div>
      </div>
      <div class="info-box"><strong>Key Insight</strong>Quantum computers are not better at everything — they excel at specific problems like optimisation, drug simulation, and cryptography. For everyday tasks, classical computers remain superior and more practical.</div>

    content:`
      <p><strong>Perceptual Computing</strong> is a technology that enables computers to perceive, understand, and interact with the world the way humans do — using sight, sound, touch, and speech — rather than requiring traditional input like keyboards and mice.</p>
      <div class="highlight-box"><strong>Core Idea</strong>Perceptual computers can see, hear, and feel. Instead of you learning to use the computer, the computer learns to understand YOU.</div>
      <h3>Key Features of Perceptual Computing</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Facial Recognition</strong>The computer identifies who you are by analysing your face. Used for phone unlock, security systems, and photo tagging</div>
        <div class="example-item"><strong>Gesture Control</strong>Control a computer by waving your hands or moving your body — no keyboard or mouse needed. Example: Intel RealSense camera, Microsoft Kinect</div>
        <div class="example-item"><strong>Voice/Speech Recognition</strong>The computer understands natural spoken language. Examples: Siri, Google Assistant, Alexa, Cortana</div>
        <div class="example-item"><strong>Emotion Recognition (Affective Computing)</strong>Detects human emotions from facial expressions, voice tone, and body language — enabling more empathetic human-computer interaction</div>
        <div class="example-item"><strong>Eye Tracking</strong>Tracks where your eyes are looking on the screen. Used for advertising research, accessibility (controlling computers with eye movements), and gaming</div>
        <div class="example-item"><strong>Touch & Force Sensing</strong>Pressure-sensitive screens that detect how hard you press. Used in Apple Force Touch and medical simulation devices</div>
        <div class="example-item"><strong>3D Environment Sensing</strong>Depth cameras (like Microsoft Azure Kinect) that understand the 3D structure of a room and the objects in it</div>
        <div class="example-item"><strong>Natural Language Processing (NLP)</strong>Understanding context, sarcasm, idioms, and intent in human language — not just individual words</div>
      </div>
      <h3>Applications of Perceptual Computing</h3>
      <ul>
        <li><strong>Healthcare:</strong> Gesture-controlled surgery rooms (doctors don't need to touch screens with sterile hands)</li>
        <li><strong>Gaming:</strong> Full body motion control — games that respond to how you move</li>

    content:`
      <p>JHS 3 explores cutting-edge output technologies that are changing how we read, receive information, and interact with digital content beyond traditional screens.</p>
      <h3>Wearable Displays</h3>
      <p>Wearable displays are screens worn on the body — bringing computing into everyday life without needing to hold a device.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Google Glass</strong>Smart glasses with a small transparent display in the upper-right corner of one lens. Shows information (notifications, navigation, photos) in the wearer's field of view. Has a camera, microphone, and Wi-Fi. Original version discontinued; Enterprise Edition used in manufacturing and healthcare</div>
        <div class="example-item"><strong>Smartwatch Displays</strong>Small screens on the wrist showing notifications, health data, navigation, and apps. Examples: Apple Watch, Samsung Galaxy Watch, Fitbit</div>
        <div class="example-item"><strong>AR Headsets (HMDs)</strong>Head-Mounted Displays that project digital information over the real world. Examples: Microsoft HoloLens, Meta Quest Pro</div>
        <div class="example-item"><strong>Smart Clothing</strong>Displays embedded in fabric — experimental technology for fitness tracking and medical monitoring</div>
      </div>
      <h3>E-Paper (Electronic Paper)</h3>
      <p>E-Paper (also called e-ink) is a display technology that mimics the appearance of actual ink on paper.</p>
      <div class="example-grid">
        <div class="example-item"><strong>How it works</strong>Tiny microcapsules contain black and white particles. Electrical charges move particles to create text and images — then the image stays without any power needed to maintain it</div>
        <div class="example-item"><strong>Key Features</strong>Uses power ONLY when changing the image (not to maintain it) · Readable in direct sunlight · No backlight = no eye strain · Very thin and flexible · Monochrome (mainly) or limited colour</div>
        <div class="example-item"><strong>Uses</strong>E-readers (Kindle) · Digital price tags in supermarkets · Electronic shelf labels · Smart packaging · Bus stop displays</div>
        <div class="example-item"><strong>Disadvantages</strong>Slow refresh rate (not suitable for video) · Limited colour · Higher cost than LCD initially</div>
      </div>
      <h3>E-Books and Kindle</h3>
      <p>An <strong>e-book</strong> is a digital version of a book stored as a file. A <strong>Kindle</strong> is Amazon's dedicated e-book reader using E-Paper technology.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Advantages of E-Books</strong>Carry thousands of books in one device · Instant download worldwide · Adjustable font size · Built-in dictionary · Environmental benefit (no paper)</div>
        <div class="example-item"><strong>Kindle Features</strong>6–7 inch E-ink display · Weeks of battery life · Built-in lighting · Waterproof models · Can hold 32GB (thousands of books) · Wi-Fi to download books from anywhere</div>
      </div>
      <div class="info-box"><strong>Ghana Application</strong>E-readers and tablets with educational e-books are being distributed to schools in Ghana as part of digital learning initiatives. Ghana Education Service has explored digital textbooks to reduce the cost of physical books.</div>
    `,

  s1l4:{

    title:'Cloud & Network Storage Systems', xp:25, next:'s1l5', prev:'s1l3',
    content:`
      <p>JHS 3 storage focuses on advanced, networked storage solutions — from cloud computing to futuristic holographic storage.</p>
      <h3>Network Storage Systems</h3>
      <div class="example-grid">
        <div class="example-item"><strong>NAS (Network Attached Storage)</strong>A dedicated storage device connected to a local network. All computers on the network can access shared files. Used in offices, schools, and homes with multiple computers</div>
        <div class="example-item"><strong>Home Server / Media Server</strong>A computer dedicated to storing and streaming media (movies, music, photos) to other devices in the home. Examples: Plex Media Server, Windows Home Server</div>
        <div class="example-item"><strong>SAN (Storage Area Network)</strong>A high-speed network of storage devices accessed by servers. Used by large enterprises, banks, and data centres for fast, reliable access to massive data</div>
      </div>
      <h3>Cloud Storage</h3>
      <p>Cloud storage stores your data on remote servers accessed via the internet — you don't need a physical storage device.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Google Drive</strong>15GB free with Google account. Access from any device. Integrates with Docs, Sheets, Slides for collaborative work</div>
        <div class="example-item"><strong>Microsoft OneDrive</strong>Integrated with Windows and Microsoft Office. 5GB free. Business plans available</div>
        <div class="example-item"><strong>Dropbox</strong>2GB free. Famous for its simple sync across devices. Popular with creative professionals</div>
        <div class="example-item"><strong>iCloud</strong>Apple's cloud service — 5GB free. Seamlessly syncs Apple devices (iPhone, iPad, Mac)</div>
      </div>
      <div class="example-grid">
        <div class="example-item"><strong>✅ Pros of Cloud Storage</strong>Access from anywhere · Automatic backup · Share easily with others · Scales up as you need more space · No physical device to lose or damage</div>
        <div class="example-item"><strong>❌ Cons of Cloud Storage</strong>Requires internet connection · Monthly fees for large storage · Privacy concerns (data is on someone else's server) · Risk if company closes down · Data sovereignty issues</div>
      </div>
      <h3>Smart Cards</h3>
      <p>A smart card is a credit-card-sized plastic card with an embedded microchip that stores and processes data securely.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Contact Smart Cards</strong>Must be inserted into a reader (chip-and-PIN bank cards)</div>
        <div class="example-item"><strong>Contactless Smart Cards</strong>RFID/NFC — just tap the reader (contactless payment, access control)</div>
        <div class="example-item"><strong>Uses in Ghana</strong>Ghana Card (national ID), bank debit/credit cards, SIM cards (which are smart cards), health insurance cards (NHIS)</div>
      </div>
      <h3>Holographic Storage</h3>
      <p>Holographic storage uses laser light to store data as three-dimensional patterns within a photosensitive crystal or polymer material — rather than on a 2D surface like a CD/DVD.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Advantages</strong>Massive capacity (theoretically terabytes per cm³) · Extremely fast read speeds · Data stored throughout the whole material, not just the surface</div>
        <div class="example-item"><strong>Current Status</strong>Still largely experimental/research-stage. Not yet commercially available for consumers but promising for data centres</div>
      </div>
    `,
    quiz:[
      {q:'Which cloud storage service is integrated with Microsoft Office and Windows?',opts:['Google Drive','Dropbox','iCloud','Microsoft OneDrive'],ans:3},
      {q:'NAS stands for:',opts:['Network Access System','Network Attached Storage','Non-Assigned Storage','New Array System'],ans:1},
      {q:'Which is a DISADVANTAGE of cloud storage?',opts:['You can access it from anywhere','It automatically backs up your data','It requires an internet connection — no internet means no access','It allows easy file sharing'],ans:2},
      {q:'Ghana\'s National ID (Ghana Card) is an example of which storage technology?',opts:['Cloud storage','Holographic storage','Smart card','USB Flash Drive'],ans:2},
      {q:'Holographic storage differs from traditional storage because:',opts:['It is cheaper','Data is stored as 3D patterns throughout the material — not on a flat surface','It uses radio waves','It is already in every laptop'],ans:1}
    ]
  },

  s1l5:{
    strand:'Strand 1: Introduction to Computing', sub:'Sub-strand 2: Desktop Features',
    title:'Desktop Personalisation & Computer Settings', xp:15, next:'s1l6', prev:'s1l4',
    content:`
      <p>Personalisation makes your computer feel like yours — adjusting its appearance and behaviour to suit your preferences and improve your productivity.</p>
      <h3>Changing Desktop Icons</h3>
      <p>Desktop icons are shortcuts to programs, files, and folders. You can change their appearance:</p>
      <div class="highlight-box"><strong>How to change a desktop icon:</strong><br>
      Right-click the icon → Properties → Change Icon → Browse for a new icon image (.ico file) → OK<br>
      OR: Right-click desktop → Personalise → Themes → Desktop icon settings (for system icons like This PC, Recycle Bin)</div>
      <div class="example-grid">
        <div class="example-item"><strong>Icon Size</strong>Right-click desktop → View → choose Large, Medium, or Small icons</div>
        <div class="example-item"><strong>Auto-arrange</strong>Right-click desktop → View → Auto arrange icons — automatically lines up icons in a grid</div>
        <div class="example-item"><strong>Create Shortcuts</strong>Right-click a program → Send to → Desktop (create shortcut) — adds an icon without moving the program</div>
        <div class="example-item"><strong>Custom Icons</strong>Download .ico files from the internet, or convert images to .ico format to create unique icon designs</div>
      </div>
      <h3>Changing Mouse Pointers</h3>
      <p>You can change how your mouse cursor looks — useful for visibility, personalisation, and accessibility:</p>
      <div class="highlight-box"><strong>How to change mouse pointers:</strong><br>
      Settings → Bluetooth & devices → Mouse → Additional mouse settings → Pointers tab → Choose a scheme or browse for .cur/.ani cursor files → Apply → OK</div>
      <div class="example-grid">
        <div class="example-item"><strong>Pointer Schemes</strong>Windows comes with built-in schemes: Windows Default, Windows Black, Windows Standard (Large), Windows Inverted. Large pointers help users with visual impairment</div>
        <div class="example-item"><strong>Pointer Speed</strong>Settings → Bluetooth & devices → Mouse → Mouse pointer speed slider. Faster = pointer moves more with small movements. Adjust to your comfort</div>
        <div class="example-item"><strong>Pointer Trails</strong>Adds a fading trail behind the moving cursor — helps on low-contrast screens. Additional mouse settings → Pointer Options → Display pointer trails</div>
        <div class="example-item"><strong>Custom Cursors</strong>Download .cur or .ani (animated) cursor files and import them via the Pointers tab</div>
      </div>
      <h3>Other Personalisation Options</h3>
      <ul>
        <li><strong>Wallpaper/Background:</strong> Settings → Personalisation → Background. Set a photo, colour, or slideshow</li>
        <li><strong>Themes:</strong> Bundle of wallpaper + colours + sounds + cursor. Settings → Personalisation → Themes</li>
        <li><strong>Accent Colour:</strong> The colour used for taskbar, Start menu, and highlighted items</li>
        <li><strong>Dark Mode:</strong> Settings → Personalisation → Colours → Choose your mode: Dark/Light/Custom — easier on eyes at night</li>
        <li><strong>Screen Saver:</strong> Activates after inactivity. Settings → Lock screen → Screen saver settings</li>
      </ul>
    `,
    quiz:[
      {q:'To change the appearance of a desktop icon in Windows, you right-click it and select:',opts:['Open','Run','Properties → Change Icon','Delete'],ans:2},
      {q:'Which personalisation feature combines wallpaper, colours, sounds, and cursors into one package?',opts:['Screensaver','Theme','Dark Mode','Accent Colour'],ans:1},
      {q:'Why might a user choose a large mouse pointer scheme?',opts:['It makes the computer faster','It is more decorative','It helps users with visual impairments see the cursor better','It saves battery'],ans:2},
      {q:'Dark Mode in Windows changes:',opts:['Only the wallpaper to black','The interface to use dark backgrounds — easier on eyes at night','The mouse pointer colour','The font of all text'],ans:1},
      {q:'Pointer Trails are useful because:',opts:['They make the cursor glow','They add a fading trail to help track the cursor on low-contrast screens','They increase cursor speed','They change the cursor shape'],ans:1}
    ]
  },

  s1l6:{
    strand:'Strand 1: Introduction to Computing', sub:'Sub-strand 2: Desktop Features',
    title:'Device Drivers & Plug-and-Play Hardware', xp:25, next:'s1l7', prev:'s1l5',
    content:`
      <p>When you connect a new device to your computer — a printer, camera, or headset — the computer needs special software called a <strong>driver</strong> to communicate with it.</p>
      <div class="highlight-box"><strong>Definition</strong>A device driver is software that acts as a translator between the operating system (Windows) and a hardware device. Without the correct driver, the hardware cannot function properly.</div>
      <h3>Types of Device Drivers</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Sound/Audio Drivers</strong>Control how your computer handles audio — speakers, microphone, headphones. Examples: Realtek Audio Driver, NVIDIA HD Audio. Without it: no sound or microphone</div>
        <div class="example-item"><strong>Video/Graphics Drivers</strong>Control the GPU (Graphics Processing Unit) — determine display resolution, frame rates, and visual quality. Examples: NVIDIA GeForce, AMD Radeon, Intel Graphics. Without it: low resolution, no gaming</div>
        <div class="example-item"><strong>Printer Drivers</strong>Allow the OS to send print jobs to specific printer models. Each printer brand/model needs its own driver</div>
        <div class="example-item"><strong>Network Drivers</strong>Control Wi-Fi and Ethernet cards — enable internet connectivity. Without it: no internet connection</div>
        <div class="example-item"><strong>Chipset Drivers</strong>Control communication between the CPU and other components on the motherboard</div>
        <div class="example-item"><strong>USB Drivers</strong>Allow USB ports and connected devices to work. Most are built into Windows</div>
      </div>
      <h3>Plug-and-Play (PnP) Devices</h3>
      <p><strong>Plug-and-Play</strong> means the operating system automatically detects and installs the driver for a new device when you connect it — you don't need to find and install drivers manually.</p>
      <div class="example-grid">
        <div class="example-item"><strong>How PnP works</strong>1. Connect device → 2. Windows detects new hardware → 3. Searches driver database → 4. Installs automatically → 5. Device ready to use (often requires restart)</div>
        <div class="example-item"><strong>PnP Examples</strong>USB keyboard, mouse, flash drive, webcam, headset — plug in and they work immediately. Windows Update often downloads drivers in the background</div>
      </div>
      <h3>Managing Drivers in Windows</h3>
      <p>Device Manager is the tool for managing all hardware and drivers:</p>
      <ul>
        <li><strong>Open Device Manager:</strong> Right-click Start → Device Manager</li>
        <li><strong>View all devices:</strong> Expand categories to see each device and its driver status</li>
        <li><strong>Yellow ! symbol:</strong> Driver problem — device not working correctly</li>
        <li><strong>Update Driver:</strong> Right-click device → Update driver → Search automatically or browse for driver file</li>
        <li><strong>Rollback Driver:</strong> If an update causes problems, right-click → Properties → Driver tab → Roll Back Driver</li>
        <li><strong>Uninstall Driver:</strong> Right-click device → Uninstall device (removes driver; device disconnects)</li>
      </ul>
      <div class="info-box"><strong>Practical Tip</strong>If a device is not working after connecting, open Device Manager and look for a yellow warning triangle. Update or reinstall the driver. Visit the manufacturer's website (e.g. hp.com, canon.com) to download the latest official driver for your specific model.</div>
    `,
    quiz:[
      {q:'What is a device driver?',opts:['A person who delivers computer hardware','Software that enables the OS to communicate with a hardware device','A type of USB cable','A file management system'],ans:1},
      {q:'A yellow exclamation mark (!) in Device Manager indicates:',opts:['The device is working perfectly','The device driver has a problem and the device is not working correctly','The device needs charging','The driver is outdated but still works'],ans:1},
      {q:'Which driver type controls screen resolution and visual quality for gaming?',opts:['Sound driver','Network driver','Video/Graphics driver','USB driver'],ans:2},
      {q:'"Plug-and-Play" means:',opts:['You must always install drivers manually','The OS automatically detects and installs drivers for new hardware','You can only use USB devices','The device comes with printed instructions'],ans:1},
      {q:'To revert to an older driver after an update causes problems, you use:',opts:['Device Manager → Uninstall','Device Manager → Rollback Driver','Control Panel → Add Programs','System Restore only'],ans:1}
    ]
  },

  s1l7:{
    strand:'Strand 1: Introduction to Computing', sub:'Sub-strand 2: Technology in the Community',
    title:'Technology Solutions in the Community', xp:25, next:'s1l8', prev:'s1l6',
    content:`
      <p>JHS 3 challenges you to think like a <strong>technology designer</strong> — identifying real problems in your community and proposing, designing, and presenting technology-based solutions.</p>
      <div class="highlight-box"><strong>Design Thinking Process</strong>1. EMPATHISE — understand the problem · 2. DEFINE — clearly state the problem · 3. IDEATE — brainstorm solutions · 4. PROTOTYPE — design/sketch the solution · 5. TEST — present and get feedback</div>
      <h3>Identifying Community Problems Solvable with Technology</h3>
      <div class="example-grid">
        <div class="example-item"><strong>Healthcare Access</strong>Problem: Rural communities far from hospitals. Solution: Telemedicine app connecting patients to doctors via video call. Drone delivery of medicine (like Zipline)</div>
        <div class="example-item"><strong>Agricultural Productivity</strong>Problem: Farmers don't know best planting times or receive low prices. Solution: Farming app providing weather data, market prices, and crop disease detection using AI</div>
        <div class="example-item"><strong>Education Access</strong>Problem: Schools lack textbooks and qualified teachers. Solution: Offline digital learning platform on tablets; AI tutoring chatbots</div>
        <div class="example-item"><strong>Road Safety</strong>Problem: Many accidents due to poor road conditions. Solution: Pothole reporting app where citizens photograph potholes; GPS routing avoiding bad roads</div>
        <div class="example-item"><strong>Waste Management</strong>Problem: Illegal dumping and poor waste collection. Solution: App to report illegal dumping; smart bins that send alerts when full; e-waste collection system</div>
        <div class="example-item"><strong>Financial Inclusion</strong>Problem: Many Ghanaians lack bank accounts. Solution: Mobile money platforms (MoMo) allow savings, transfers, and payments without a bank account</div>
      </div>
      <h3>Designing a Technology Solution</h3>
      <p>When designing a solution, consider:</p>
      <ul>
        <li><strong>Target users:</strong> Who will use this? What are their skills and limitations?</li>
        <li><strong>Technology needed:</strong> App? Website? Hardware device? Sensor? AI system?</li>
        <li><strong>Cost:</strong> How affordable is the solution for your community?</li>
        <li><strong>Sustainability:</strong> Will it work long-term? Who maintains it?</li>
        <li><strong>Impact:</strong> How many people will benefit? How significantly?</li>
      </ul>
      <div class="example-grid">
        <div class="example-item"><strong>Example Project: School Attendance App</strong>Problem: Teachers spend too much time taking attendance. Solution: QR code scanner at school gate that automatically records attendance when students scan their ID card. Parents get SMS if child doesn't arrive</div>
        <div class="example-item"><strong>Example Project: Market Price App</strong>Problem: Farmers sell crops below market value because they don't know the going price. Solution: App showing daily prices at all major markets (Kumasi Kejetia, Makola, etc.) — farmers can negotiate better deals</div>
      </div>
      <div class="info-box"><strong>Project Task</strong>This topic in the B9 syllabus is to be done as project work. Identify a real problem in your school or community, propose a technology solution, design it (sketch/wireframe/flowchart), and present it to your class.</div>
    `,
    quiz:[
      {q:'What is the first step in the Design Thinking process?',opts:['Build a prototype','Test the solution','Empathise — understand the problem and the people affected','Write the code'],ans:2},
      {q:'Zipline\'s drone delivery service in Ghana solves which community problem?',opts:['Road accidents','Access to healthcare — delivering medicine to remote communities','Food wastage','Water scarcity'],ans:1},
      {q:'A farmer wants to know the best time to plant and current market prices. Which type of technology solution would help most?',opts:['A gaming app','A farming app with weather data, crop advice, and market prices','A social media platform','A word processor'],ans:1},
      {q:'When designing a technology solution, "sustainability" refers to:',opts:['How colourful the design is','Whether it will work long-term and who will maintain it','How fast the internet connection is','The number of colours used in the app'],ans:1},
      {q:'Mobile Money (MoMo) in Ghana addresses which community problem?',opts:['Road safety','Agricultural productivity','Financial inclusion — allowing people without bank accounts to save and transact','Waste management'],ans:2}
    ]
  },

  s1l8:{
    strand:'Strand 1: Introduction to Computing', sub:'Sub-strand 3: Health & Safety',
    title:'Ergonomics, Lighting & Heat Management', xp:20, next:'s2l1', prev:'s1l7',
    content:`
      <p>JHS 3 health and safety reaches the highest level — focusing on <strong>ergonomics</strong> (the science of designing workplaces for human wellbeing) and managing heat from electronic devices.</p>
      <h3>Ergonomics at the Workstation</h3>
      <p><strong>Ergonomics</strong> is the science of designing equipment and environments to fit the human body, reducing strain, injury, and fatigue.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Ergonomic Keyboard</strong>Split, angled, or curved keyboards designed to keep wrists in a natural position — reduces Carpal Tunnel Syndrome and wrist strain. Example: Microsoft Ergonomic Keyboard</div>
        <div class="example-item"><strong>Ergonomic Mouse</strong>Vertical or contoured mouse designed to keep the hand in a handshake position — reduces forearm and wrist strain</div>
        <div class="example-item"><strong>Document/Paper Holder</strong>A stand that holds documents at the same height and distance as the screen — prevents constantly looking down, which strains the neck and upper back</div>
        <div class="example-item"><strong>Adjustable Chair</strong>Height, backrest angle, and armrest height should all be adjustable. Lumbar support for the lower back prevents back pain</div>
        <div class="example-item"><strong>Monitor Stand/Arm</strong>Raises monitor to eye level. Eyes should be level with the top third of the screen. Monitor should be 50-70cm from eyes</div>
        <div class="example-item"><strong>Wrist Rest</strong>Padded support in front of keyboard — allows wrists to rest in a neutral position during pauses (not while typing)</div>
      </div>
      <h3>Appropriate Lighting at the Workstation</h3>
      <div class="example-grid">
        <div class="example-item"><strong>General Lighting</strong>Even, indirect lighting is best. Avoid working in very dim light (strains eyes) or very bright light (glare). Recommended: 300-500 lux for computer work</div>
        <div class="example-item"><strong>Screen Glare</strong>Position monitor perpendicular (at 90°) to windows — not facing the window and not with the window behind you. Use blinds or curtains to control sunlight</div>
        <div class="example-item"><strong>Task Lighting</strong>A desk lamp can supplement general lighting. Aim it at documents, not at the screen (to avoid reflections)</div>
        <div class="example-item"><strong>Night Mode / Warm Light</strong>Enable Night Mode (Windows: Settings → System → Display → Night light) to reduce blue light in the evening — protects sleep patterns</div>
      </div>
      <h3>Heat Management</h3>
      <p>Computers generate significant heat, especially CPUs, GPUs, and power supplies. Excess heat causes performance throttling, hardware damage, and even fire.</p>
      <div class="example-grid">
        <div class="example-item"><strong>Internal Cooling (CPU Fan)</strong>Most computers have fans that blow air over heat sinks (metal fins) on the CPU and GPU</div>
        <div class="example-item"><strong>Liquid/Water Cooling</strong>High-performance gaming PCs use liquid coolers — pumping coolant liquid through tubes over the CPU</div>
        <div class="example-item"><strong>Thermal Paste</strong>Applied between CPU and heat sink to improve heat transfer — needs replacing every few years</div>
        <div class="example-item"><strong>Laptop Cooling Pad</strong>Elevates the laptop to allow airflow underneath — a simple and effective accessory</div>
        <div class="example-item"><strong>Proper Ventilation</strong>Never block the computer's vents with books, cushions, or walls. Ensure airflow around the device</div>
        <div class="example-item"><strong>Clean Dust Regularly</strong>Dust accumulation inside computers blocks airflow and causes overheating. Clean with compressed air every 6-12 months</div>
      </div>
      <div class="warning-box"><strong>Overheating Risks</strong>Overheated computers throttle (slow down) performance, crash unexpectedly, damage components permanently, and in extreme cases can cause fires. Always ensure adequate ventilation and cooling.</div>
    `,
    quiz:[
      {q:'What is ergonomics?',opts:['A type of computer program','The science of designing equipment and environments to fit the human body — reducing strain and injury','The study of computer networks','A type of cooling system'],ans:1},
      {q:'A document holder is used to:',opts:['Hold your coffee cup safely','Keep documents at the same height as the screen — preventing neck strain from looking down repeatedly','Store USB drives','Support the monitor'],ans:1},
      {q:'To avoid screen glare from windows, you should position your monitor:',opts:['Facing the window directly','With the window directly behind you','Perpendicular (at 90°) to windows','As close to the window as possible'],ans:2},
      {q:'What is the purpose of thermal paste between the CPU and heat sink?',opts:['To lubricate the fan','To improve heat transfer from the CPU to the heat sink','To hold them together','To cool the monitor'],ans:1},
      {q:'Which of these helps prevent laptop overheating?',opts:['Using the laptop on a bed (soft surface blocks vents)','Covering vents with a book','Using a laptop cooling pad that elevates it for airflow','Turning the brightness to maximum'],ans:2}
    ]
  },
